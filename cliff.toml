# git-cliff config (MIT/Apache-2.0, orhun/git-cliff).
#
# Generates CHANGELOG.md sections from git history using conventional commits.
# Run via `just changelog` (regenerates the [Unreleased] section) or on tag
# push (workflow appends a new release section).
#
#     git cliff --output CHANGELOG.md          # full changelog
#     git cliff --unreleased --prepend CHANGELOG.md  # only what's new
#     git cliff -t v5.0.9                      # tag a future version

[changelog]
# Header rendered once at the top of CHANGELOG.md.
header = """
# Changelog

All notable changes to ParkHub Rust are documented here.

Format follows [Keep a Changelog](https://keepachangelog.com/en/1.0.0/).
Versioning follows [Semantic Versioning](https://semver.org/).

---
"""

# Tera template — Keep-a-Changelog flavor with PR links.
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}

{% for commit in commits %}\
- {{ commit.message | upper_first | trim }}\
{% if commit.github.pr_number %} ([#{{ commit.github.pr_number }}](https://github.com/nash87/parkhub-rust/pull/{{ commit.github.pr_number }})){% endif %}
{% endfor %}
{% endfor %}\n
"""

# Footer (none — keep file open-ended for future releases).
footer = ""
trim = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
# Map conventional-commit prefixes → CHANGELOG sections.
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Changed" },
    { message = "^docs", group = "Documentation" },
    { message = "^test", group = "Tests" },
    { message = "^ci", group = "CI" },
    { message = "^chore\\(deps\\)", group = "Dependencies" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore", group = "Chore" },
    { message = "^revert", group = "Reverted" },
    { message = "^build", group = "Build" },
    { message = "^style", skip = true },
    { body = ".*security", group = "Security" },
]
# Filter out merge commits — keep individual PR commits only.
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/nash87/parkhub-rust/pull/$1" },
]

[remote.github]
owner = "nash87"
repo = "parkhub-rust"
