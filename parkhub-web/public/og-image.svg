<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#042f2e"/>
      <stop offset="100%" stop-color="#0d4744"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative grid -->
  <g opacity="0.06" stroke="#14b8a6" stroke-width="1">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
  </g>
  <!-- Parking icon -->
  <rect x="80" y="215" width="200" height="200" rx="24" fill="url(#accent)" opacity="0.15"/>
  <text x="180" y="345" font-family="system-ui, sans-serif" font-size="120" font-weight="800" fill="#14b8a6" text-anchor="middle" dominant-baseline="central">P</text>
  <!-- Title -->
  <text x="340" y="280" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="#f0fdfa" letter-spacing="-0.02em">ParkHub</text>
  <!-- Subtitle -->
  <text x="340" y="345" font-family="system-ui, sans-serif" font-size="28" fill="#99f6e4" opacity="0.8">Smart Parking Management</text>
  <!-- Features -->
  <text x="340" y="400" font-family="system-ui, sans-serif" font-size="18" fill="#5eead4" opacity="0.6">Real-time Occupancy  ·  Team Booking  ·  GDPR Compliant  ·  PWA Offline</text>
  <!-- Bottom accent line -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)" opacity="0.4"/>
</svg>
