# cargo-mutants config — run with `cargo mutants`
#
# https://mutants.rs/
#
# cargo-mutants introduces small semantic-level "mutants" (swap `true` for
# `false`, delete function bodies, flip comparisons) and runs the full test
# suite against each mutant. A mutant that escapes the tests is a gap in
# coverage; a mutant that gets caught counts as a kill. Higher kill rate =
# stronger test gauntlet.
#
# Scope mutations to parkhub-server + parkhub-common only (skip parkhub-web
# since that's TypeScript and mutation-tested separately via infection-php /
# StrykerJS-style tooling).

examine_globs = [
    "parkhub-server/src/**/*.rs",
    "parkhub-common/src/**/*.rs",
]

# Skip known-flaky paths — time-dependent code and the binary entry point
# produce mutants that either hang on intervals or can't be exercised
# from unit tests.
exclude_globs = [
    "**/jobs.rs",
    "**/main.rs",
    "**/tests/**",
    "**/*_tests.rs",
    "**/build.rs",
]

# Cap individual mutant timeout at 3× the baseline test run. Default is
# generous; keep it sane so a mutant that invalidates a loop guard can't
# hang indefinitely.
timeout_multiplier = 3.0

test_tool = "cargo"

# Only test with the default feature set — full matrix is too slow for
# nightly. `default = ["headless"]` in parkhub-server, `headless = ["full"]`
# pulls in every mod-* feature.
additional_cargo_args = ["--no-default-features", "--features", "headless"]
