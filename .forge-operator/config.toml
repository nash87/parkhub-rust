# Forge Operator - Repository Configuration
# This file configures forge-operator behavior for this repository.
# Default product mode: fully integrated Forge Operator with explicit opt-out.
# Works local-only, remote-provider, or hybrid depending on URLs and discovery.

# [hooks]
# Commands run once when a session is first created
# on_create = ["npm install", "cp .env.example .env"]
# Commands run every time a session starts
# on_launch = ["npm install"]

# [session]
# default_tool = "codex"

# [build]
# build_queue_enabled = true
# taskrunner_enabled = true
# discover_local_services = true
#
# Preferred build backend for this repo:
# preferred_backend = "forge-build-queue"
#
# Explicit providers for publishable or cross-platform setups:
# forge_build_queue_url = "http://127.0.0.1:9060"
# forge_build_queue_token_env = "FORGE_BUILD_TOKEN"
#
# Local or remote taskrunner:
# forge_taskrunner_url = "http://127.0.0.1:9200"
# forge_taskrunner_token_env = "FORGE_TASKRUNNER_TOKEN"

# [sandbox]
# enabled_by_default = true
# default_image = "ghcr.io/your-org/forge-operator-dev:latest"
# List fields below replace (not append to) global settings when set:
# environment = ["NODE_ENV", "DATABASE_URL"]
# volume_ignores = ["node_modules", ".next"]

# [worktree]
# enabled = true

# [updates]
# check_enabled = false

# [tmux]
# status_bar = "auto"
# mouse = "auto"

# [sound]
# enabled = false
