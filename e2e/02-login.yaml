url: ${BASE_URL}
---
# Login Flow
- launchApp

# Wait for page
- extendedWaitUntil:
    visible: "Get Started|Sign In"
    timeout: 30000

# Skip welcome
- runFlow:
    when:
      visible: "Get Started"
    commands:
      - tapOn: "Get Started"

# Wait for login form
- extendedWaitUntil:
    visible: "Sign In"
    timeout: 10000

# Enter credentials
- tapOn:
    id: "username"
- eraseText: 50
- inputText: "admin@parkhub.test"

- tapOn:
    id: "password"
- eraseText: 50
- inputText: "demo"

# Click submit button by ID
- tapOn:
    id: "login-submit"

# Wait for dashboard nav to appear
- extendedWaitUntil:
    visible: "Bookings"
    timeout: 20000
