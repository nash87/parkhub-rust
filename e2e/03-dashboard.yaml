url: ${BASE_URL}
---
# Dashboard + Navigation
- launchApp

# Wait for any page to load (may already be logged in from previous flow)
- extendedWaitUntil:
    visible: "Get Started|Sign In|Dashboard|Active Bookings"
    timeout: 30000

# If on welcome page, navigate to login
- runFlow:
    when:
      visible: "Get Started"
    commands:
      - tapOn: "Get Started"

# If on login page, log in
- runFlow:
    when:
      visible: "Sign In"
    commands:
      - tapOn:
          id: "username"
      - inputText: "admin@parkhub.test"
      - tapOn:
          id: "password"
      - inputText: "demo"
      - tapOn:
          id: "login-submit"

# Dashboard loaded
- extendedWaitUntil:
    visible: "Active Bookings|Credits"
    timeout: 15000

# Navigate to Bookings
- tapOn: "Bookings"
- extendedWaitUntil:
    visible: "My Bookings"
    timeout: 5000

# Navigate to Vehicles
- tapOn: "Vehicles"
- extendedWaitUntil:
    visible: "My Vehicles"
    timeout: 5000
