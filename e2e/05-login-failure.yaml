url: ${BASE_URL}
---
# Login failure
- launchApp

# Wait for any page
- extendedWaitUntil:
    visible: "Get Started|Sign In|Dashboard|Active Bookings"
    timeout: 30000

# If already logged in, sign out first
- runFlow:
    when:
      visible: "Sign Out"
    commands:
      - tapOn: "Sign Out"
      - extendedWaitUntil:
          visible: "Get Started|Sign In"
          timeout: 10000

# If on welcome page, navigate to login
- runFlow:
    when:
      visible: "Get Started"
    commands:
      - tapOn: "Get Started"

- extendedWaitUntil:
    visible: "Sign In"
    timeout: 10000

# Wrong password
- tapOn:
    id: "username"
- inputText: "admin@parkhub.test"
- tapOn:
    id: "password"
- inputText: "wrongpassword"
- tapOn:
    id: "login-submit"

# Should show error
- extendedWaitUntil:
    visible: "Invalid|failed|error"
    timeout: 10000

# Still on login page
- assertVisible: "Sign In"
