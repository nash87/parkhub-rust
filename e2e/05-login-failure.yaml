url: ${BASE_URL}
---
# Login failure — verify wrong password is rejected
# Uses a non-existent user to avoid Chrome auto-fill overriding the password
- launchApp

# Wait for page
- extendedWaitUntil:
    visible: "Get Started|Sign In|Dashboard"
    timeout: 30000

# If logged in, sign out
- runFlow:
    when:
      visible: "Sign Out"
    commands:
      - tapOn: "Sign Out"

# Navigate to login if needed
- runFlow:
    when:
      visible: "Get Started"
    commands:
      - tapOn: "Get Started"

# Wait for login form
- extendedWaitUntil:
    visible: "Sign In"
    timeout: 15000

# Use a non-existent email so Chrome won't auto-fill
- tapOn:
    id: "username"
- inputText: "nonexistent@parkhub.test"
- tapOn:
    id: "password"
- inputText: "wrongpassword"
- tapOn:
    id: "login-submit"

# Should show error
- extendedWaitUntil:
    visible: "Login failed|Invalid|incorrect|not found"
    timeout: 15000

# Still on login page (submit button still present)
- assertVisible:
    id: "login-submit"
