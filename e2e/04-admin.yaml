url: ${BASE_URL}
---
# Admin panel
- launchApp

# Wait for any page to load (may already be logged in from previous flow)
- extendedWaitUntil:
    visible: "Get Started|Sign In|Dashboard|Active Bookings"
    timeout: 30000

# If on welcome page, navigate to login
- runFlow:
    when:
      visible: "Get Started"
    commands:
      - tapOn: "Get Started"

# If on login page, log in
- runFlow:
    when:
      visible: "Sign In"
    commands:
      - tapOn:
          id: "username"
      - inputText: "admin@parkhub.test"
      - tapOn:
          id: "password"
      - inputText: "demo"
      - tapOn:
          id: "login-submit"

- extendedWaitUntil:
    visible: "Active Bookings|Credits"
    timeout: 15000

# Navigate to Admin
- tapOn: "Admin"
- extendedWaitUntil:
    visible: "Settings|Reports"
    timeout: 5000

# Check Settings
- tapOn: "Settings"
- extendedWaitUntil:
    visible: "System Settings"
    timeout: 5000

# Check Users
- tapOn: "Users"
- extendedWaitUntil:
    visible: "admin"
    timeout: 5000
