url: ${BASE_URL}
---
# Admin panel
- launchApp

# Login
- extendedWaitUntil:
    visible: "Get Started|Sign In"
    timeout: 30000

- runFlow:
    when:
      visible: "Get Started"
    commands:
      - tapOn: "Get Started"

- extendedWaitUntil:
    visible: "Sign In"
    timeout: 10000

- tapOn:
    id: "demo-autofill"
- tapOn:
    id: "login-submit"

- extendedWaitUntil:
    visible: "Active Bookings|Credits"
    timeout: 15000

# Navigate to Admin
- tapOn: "Admin"
- extendedWaitUntil:
    visible: "Settings|Reports"
    timeout: 5000

# Check Settings
- tapOn: "Settings"
- extendedWaitUntil:
    visible: "System Settings"
    timeout: 5000

# Check Users
- tapOn: "Users"
- extendedWaitUntil:
    visible: "admin"
    timeout: 5000
