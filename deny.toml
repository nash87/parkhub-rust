# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Allow unmaintained rustls-pemfile — migration to rustls-pki-types PemObject planned
ignore = [
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained
]

[licenses]
# Allow common permissive licenses
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
    "0BSD",
    "NCSA",
    "CDLA-Permissive-2.0",
    "LGPL-2.1-or-later",
]
# Slint uses a custom royalty-free license for open-source use
exceptions = [
    { allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"], crate = "slint" },
    { allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"], crate = "slint-build" },
    { allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"], crate = "slint-macros" },
    { allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"], crate = "i-slint-core" },
    { allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"], crate = "i-slint-backend-selector" },
    { allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"], crate = "i-slint-backend-winit" },
    { allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"], crate = "i-slint-common" },
    { allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"], crate = "i-slint-compiler" },
    { allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"], crate = "i-slint-core-macros" },
    { allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"], crate = "i-slint-renderer-skia" },
    { allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"], crate = "i-slint-backend-linuxkms" },
]
# Confidence threshold for detecting a license from file contents
confidence-threshold = 0.8

[bans]
# Warn on multiple versions of the same crate
multiple-versions = "warn"
# Allow duplicate versions
wildcards = "allow"

[sources]
# Only allow crates from crates.io and git repos
unknown-registry = "deny"
unknown-git = "allow"
