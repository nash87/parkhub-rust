# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Ignore unmaintained/vulnerable transitive dependencies from Slint GUI framework
# These come from GTK3 bindings and are only used in the optional GUI feature
ignore = [
    "RUSTSEC-2024-0412", # gtk-rs GTK3 unmaintained (atk)
    "RUSTSEC-2024-0413", # gtk-rs GTK3 unmaintained (gdk)
    "RUSTSEC-2024-0415", # gtk-rs GTK3 unmaintained (gdk-pixbuf)
    "RUSTSEC-2024-0416", # gtk-rs GTK3 unmaintained (gdk-sys)
    "RUSTSEC-2024-0418", # gtk-rs GTK3 unmaintained (gtk)
    "RUSTSEC-2024-0419", # gtk-rs GTK3 unmaintained (gtk-sys)
    "RUSTSEC-2024-0420", # gtk-rs GTK3 unmaintained (gtk3-macros)
    "RUSTSEC-2024-0436", # paste unmaintained
    "RUSTSEC-2024-0370", # proc-macro-error unmaintained
    "RUSTSEC-2023-0071", # rsa Marvin Attack (transitive dep)
    "RUSTSEC-2025-0057", # fxhash unmaintained (transitive via selectors)
    "RUSTSEC-2023-0019", # kuchiki unmaintained (transitive via printpdf)
    "RUSTSEC-2025-0141", # bincode unmaintained (transitive via hyphenation -> printpdf 0.9; upstream still uses 1.x)
    # Tauri-transitive advisories (webkit2gtk 4.1 → gtk3 stack on Linux).
    # The GTK4/WebKitGTK 6 migration is upstream-blocked on Tauri; these
    # are unmaintained-but-functional bindings until that lands.
    "RUSTSEC-2024-0411", # glib (gtk-rs core, unmaintained)
    "RUSTSEC-2024-0414", # gio (gtk-rs, unmaintained)
    "RUSTSEC-2024-0417", # pango (gtk-rs, unmaintained)
    "RUSTSEC-2025-0081", # soup2 / webkit2gtk transitive unmaintained
    "RUSTSEC-2025-0075", # another webkit2gtk transitive
    # Slint/Tauri Unicode database crates (unic-*) — pulled via Slint's
    # compiler for .slint file parsing. The unic-* family was superseded
    # by the built-in `char` methods + the icu crates; maintainers moved on
    # but the crates still work. Upstream tracking: slint 1.16 will swap
    # to icu-based text handling.
    "RUSTSEC-2025-0080", # unic-common unmaintained
    "RUSTSEC-2025-0098", # unic-ucd-version unmaintained
    "RUSTSEC-2025-0100", # unic-ucd-ident unmaintained
]

[licenses]
# Confidence threshold for detecting a license from file contents
confidence-threshold = 0.8
# Allow common permissive licenses
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
    "0BSD",
    "NCSA",
    "CDLA-Permissive-2.0",
    "LGPL-2.1-or-later",
]
# Slint uses a custom royalty-free license for open-source use
# All i-slint-* crates share the same tri-license
[[licenses.exceptions]]
allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"]
crate = "slint"
[[licenses.exceptions]]
allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"]
crate = "slint-build"
[[licenses.exceptions]]
allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"]
crate = "slint-macros"
[[licenses.exceptions]]
allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"]
crate = "i-slint-core"
[[licenses.exceptions]]
allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"]
crate = "i-slint-backend-selector"
[[licenses.exceptions]]
allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"]
crate = "i-slint-backend-winit"
[[licenses.exceptions]]
allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"]
crate = "i-slint-common"
[[licenses.exceptions]]
allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"]
crate = "i-slint-compiler"
[[licenses.exceptions]]
allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"]
crate = "i-slint-core-macros"
[[licenses.exceptions]]
allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"]
crate = "i-slint-renderer-skia"
[[licenses.exceptions]]
allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"]
crate = "i-slint-backend-linuxkms"
[[licenses.exceptions]]
allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"]
crate = "i-slint-renderer-femtovg"
[[licenses.exceptions]]
allow = ["GPL-3.0-only", "LicenseRef-Slint-Royalty-free-2.0", "LicenseRef-Slint-Software-3.0"]
crate = "i-slint-renderer-software"

[bans]
# Warn on multiple versions of the same crate
multiple-versions = "warn"
# Allow duplicate versions
wildcards = "allow"

[sources]
# Only allow crates from crates.io and git repos
unknown-registry = "deny"
unknown-git = "allow"
