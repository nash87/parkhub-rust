name: Feature Request
description: Suggest a new feature for ParkHub
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      placeholder: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: How should this work?
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New module
        - Enhancement to existing module
        - API change
        - UI/UX improvement
        - Documentation
        - DevOps/CI
