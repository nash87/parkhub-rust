name: Install Smoke
on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permissions intentionally empty; the single docker-compose
# job declares the minimum (contents: read) it needs.
permissions: {}

jobs:
  docker-compose:
    name: Docker Compose install smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read  # required for actions/checkout to fetch the workflow ref
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Cold clone
        run: |
          git clone --depth 1 https://github.com/nash87/parkhub-rust.git /tmp/smoke
      - name: Follow INSTALLATION.md Docker Compose steps
        working-directory: /tmp/smoke
        env:
          # Cloud runners can't reach the homelab LAN mirror; pull the same
          # Wolfi base from Chainguard's public registry. Dockerfile defaults
          # to the LAN mirror for local + gitea-runner builds.
          WOLFI_BASE: cgr.dev/chainguard/wolfi-base@sha256:4973aa3c2ccbe13fe2049aab539b0ab342ec584bd5b54a269d55d4891091c639
        run: |
          # Step 2 — set admin password
          echo "PARKHUB_ADMIN_PASSWORD=$(openssl rand -base64 24)" > .env
          # Step 4 — start
          docker compose up -d
          # Step 5 — verify
          for i in {1..60}; do
            if curl -sf http://localhost:8080/health/ready >/dev/null 2>&1; then
              echo "READY after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "FAIL: /health/ready never green"
          docker compose logs
          exit 1
      - name: Teardown
        if: always()
        working-directory: /tmp/smoke
        run: docker compose down -v
