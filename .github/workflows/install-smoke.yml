name: Install Smoke
on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Cold clone
        run: |
          git clone --depth 1 https://github.com/nash87/parkhub-rust.git /tmp/smoke
      - name: Follow INSTALLATION.md Docker Compose steps
        working-directory: /tmp/smoke
        run: |
          # Step 2 — set admin password
          echo "PARKHUB_ADMIN_PASSWORD=$(openssl rand -base64 24)" > .env
          # Step 4 — start
          docker compose up -d
          # Step 5 — verify
          for i in {1..60}; do
            if curl -sf http://localhost:8080/health/ready >/dev/null 2>&1; then
              echo "READY after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "FAIL: /health/ready never green"
          docker compose logs
          exit 1
      - name: Teardown
        if: always()
        working-directory: /tmp/smoke
        run: docker compose down -v
