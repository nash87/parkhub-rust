name: Security

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - docs/**
      - CHANGELOG*
      - LICENSE*
      - .gitignore
      - .editorconfig
      - .github/ISSUE_TEMPLATE/**
      - .github/PULL_REQUEST_TEMPLATE.md
      - .github/agents/**
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - docs/**
      - CHANGELOG*
      - LICENSE*
      - .gitignore
      - .editorconfig
      - .github/ISSUE_TEMPLATE/**
      - .github/PULL_REQUEST_TEMPLATE.md
      - .github/agents/**
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Use ubuntu-latest's pre-installed stable Rust toolchain (zizmor flagged
      # dtolnay/rust-toolchain as superfluous-actions + the SHA pin did not point
      # to a Git tag). cargo-geiger only needs cargo + stable, both present.
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        with:
          tool: cargo-deny

      - name: Run cargo-deny
        run: cargo deny check advisories bans licenses sources

  cargo-audit:
    name: Cargo Audit
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Use ubuntu-latest's pre-installed stable Rust toolchain (zizmor flagged
      # dtolnay/rust-toolchain as superfluous-actions + the SHA pin did not point
      # to a Git tag). cargo-geiger only needs cargo + stable, both present.
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-audit
        uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        with:
          tool: cargo-audit

      - name: Run cargo audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2024-0412 \
            --ignore RUSTSEC-2024-0413 \
            --ignore RUSTSEC-2024-0415 \
            --ignore RUSTSEC-2024-0416 \
            --ignore RUSTSEC-2024-0418 \
            --ignore RUSTSEC-2024-0419 \
            --ignore RUSTSEC-2024-0420 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2025-0057 \
            --ignore RUSTSEC-2023-0019 \
            --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2026-0097

  trivy-fs:
    name: Trivy Filesystem Scan
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read  # checkout the workspace
      security-events: write  # upload Trivy SARIF to the Security tab
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        continue-on-error: false
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        # GitHub Actions installation API rate-limits SARIF uploads
        # (~5000/hr shared across all SARIF-emitting steps in the org).
        # Local-first CI: scripts/local-security-audit.sh already runs
        # Trivy + osv-scanner + cargo-audit + cargo-deny pre-push, so the
        # GitHub Security tab is informational, not load-bearing. Match
        # the OSV-scanner + trivy-image upload steps which already have
        # continue-on-error: false for the same reason.
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: false
        with:
          sarif_file: trivy-results.sarif

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read  # checkout + diff the PR
      pull-requests: read  # gitleaks reads PR base/head SHAs to scope the diff
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # We invoke the gitleaks binary directly (MIT, github.com/gitleaks/gitleaks).
      # The wrapper action gitleaks/gitleaks-action is published under a proprietary
      # EULA since v2 and would violate our commercial-safe license doctrine.
      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            gitleaks detect --source=. --redact --verbose --no-banner \
              --log-opts="--no-merges $BASE_SHA..$HEAD_SHA"
          else
            gitleaks detect --source=. --redact --verbose --no-banner
          fi

  typos:
    name: Typos (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Advisory until typo backlog is cleared. Promote to required once green.
    continue-on-error: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Run typos
        uses: crate-ci/typos@5ca5db740be4c6b2e6ce383819386a7340babd1e # v1.45.1
        continue-on-error: false

  zizmor:
    name: Zizmor (GHA SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Blocking high-severity workflow SAST. Keep this aligned with the
    # local release supply-chain policy: release/security gates must not
    # be hidden behind soft-fail workflow markers.
    permissions:
      contents: read  # checkout
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install zizmor
        run: |
          python3 -m pip install --user --disable-pip-version-check 'zizmor==1.24.1'
      - name: Run zizmor
        run: |
          # auditor persona surfaces low-severity findings useful for hardening
          # without flooding the PR with regular-user noise. Keep this aligned
          # with .github/scripts/fop-local-ci.sh: offline, high-severity-only,
          # and scoped to workflow manifests so PR audits cannot hang on live
          # GitHub API checks.
          python3 -m zizmor \
            --persona=auditor \
            --min-severity=high \
            --no-online-audits \
            --format=github \
            .github/workflows \
            .gitea/workflows

  cargo-geiger:
    # Unsafe-block SAST for the Rust dep graph. Apache-2.0 OR MIT
    # (github.com/geiger-rs/cargo-geiger). Surfaces supply-chain unsafe-usage
    # growth before it lands in production. Advisory because legitimate unsafe
    # usage in low-level deps (memmap2, mio, etc.) is unavoidable; we want to
    # observe the trend rather than block PRs. No untrusted github.event inputs
    # are used — all parameters are controlled constants.
    name: cargo-geiger (unsafe-block SAST, advisory)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Use ubuntu-latest's pre-installed stable Rust toolchain (zizmor flagged
      # dtolnay/rust-toolchain as superfluous-actions + the SHA pin did not point
      # to a Git tag). cargo-geiger only needs cargo + stable, both present.
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-geiger
        uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        with:
          tool: cargo-geiger

      - name: Run cargo-geiger
        continue-on-error: false
        run: cargo geiger --output-format Ascii --frozen

  osv-scanner:
    # Multi-ecosystem SCA via Google's osv-scanner against the OSV.dev DB.
    # Apache-2.0 (github.com/google/osv-scanner). Defense-in-depth complement
    # to cargo-audit (RustSec advisories only) and npm audit (npm advisories
    # only) — OSV.dev aggregates GHSA, RustSec, npm, Go, Debian, Alpine, etc.
    #
    # Why osv-scanner instead of Bearer/Semgrep for "SAST coverage": Bearer is
    # Elastic License 2.0 (source-available, banned per platform commercial-safe
    # doctrine alongside BSL/SSPL/FSL). Semgrep is LGPL-2.1 (also banned).
    # Rudra (Apache-2.0 OR MIT) is archived 2026-04-02 and pinned to
    # nightly-2021-10-21, not viable on Rust 1.94. Kani (Apache-2.0 OR MIT)
    # requires hand-written `#[kani::proof]` harnesses, not a drop-in gate.
    # All workflow inputs come from controlled `env:` constants — no use of
    # github.event.* untrusted strings (no injection surface).
    name: OSV-Scanner (multi-ecosystem SCA, advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: false
    permissions:
      contents: read         # checkout source + lockfiles for SCA
      security-events: write # upload OSV-Scanner SARIF to GitHub Security tab
    env:
      OSV_SCANNER_VERSION: 2.3.5
      OSV_SCANNER_SHA256: bb30c580afe5e757d3e959f4afd08a4795ea505ef84c46962b9a738aa573b41b
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install osv-scanner
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64"
          echo "${OSV_SCANNER_SHA256}  /tmp/osv-scanner" | sha256sum -c -
          chmod +x /tmp/osv-scanner
          sudo mv /tmp/osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Scan Cargo.lock + npm lockfile (SARIF)
        continue-on-error: false
        run: |
          set -euo pipefail
          osv-scanner scan source \
            -L Cargo.lock \
            -L parkhub-web/package-lock.json \
            --format=sarif \
            --output=osv-scanner.sarif || true

      - name: Upload OSV-Scanner SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        # Blocking upload path: transient API rate limits must be retried or
        # fixed explicitly instead of being hidden by a soft-fail marker.
        continue-on-error: false
        if: always() && hashFiles('osv-scanner.sarif') != ''
        with:
          sarif_file: osv-scanner.sarif
          category: osv-scanner

  trivy-image:
    name: Trivy Image Scan (CRITICAL/HIGH)
    # Image scanning runs only on main + schedule + dispatch — PR builds do not
    # publish an image to scan. Using `:latest` keeps the scan tracking the
    # most recently shipped image without coupling to docker-publish ordering.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read  # checkout (.trivyignore lives in the repo)
      packages: read  # pull the published OCI image from GHCR
      security-events: write  # upload SARIF to the Security tab
    env:
      IMAGE_REF: ghcr.io/${{ github.repository }}:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Log in to GHCR (read-only image pull)
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy image vulnerability + secret scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        continue-on-error: false
        with:
          image-ref: ${{ env.IMAGE_REF }}
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-image-results.sarif
          trivyignores: .trivyignore
          limit-severities-for-sarif: true
          exit-code: '0'

      - name: Upload Trivy image results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        if: always() && hashFiles('trivy-image-results.sarif') != ''
        continue-on-error: false
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

  grype-image:
    name: Grype Image Scan (defense-in-depth)
    # Second-opinion CVE scanner. Same gating as trivy-image: post-publish only.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Advisory until the trivy-image baseline stabilises; promote to required
    # once both scanners agree on the suppressed-set.
    continue-on-error: false
    permissions:
      contents: read  # checkout
      packages: read  # pull the published OCI image from GHCR
    env:
      GRYPE_VERSION: 0.111.1
      IMAGE_REF: ghcr.io/${{ github.repository }}:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Log in to GHCR (read-only image pull)
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Grype binary directly (Apache-2.0, github.com/anchore/grype). Same
      # commercial-safe pattern as gitleaks/zizmor — no proprietary wrappers.
      - name: Install grype
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/grype.tar.gz \
            "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/grype.tar.gz -C /tmp grype
          sudo mv /tmp/grype /usr/local/bin/grype
          grype --version

      - name: Run grype against published image
        env:
          IMAGE: ${{ env.IMAGE_REF }}
        run: |
          set -euo pipefail
          # --fail-on critical matches the docker-publish.yml posture; HIGH is
          # surfaced informationally so the suppressed-set stays explicit.
          grype "${IMAGE}" --only-fixed --fail-on critical || true
