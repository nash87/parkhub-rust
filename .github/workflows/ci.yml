name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Create placeholder web dist
        run: mkdir -p parkhub-web/dist && echo '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run cargo check
        run: |
          cargo check --package parkhub-common --all-targets
          cargo check --package parkhub-server --no-default-features --features headless --all-targets

  fmt:
    name: Cargo Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Cargo Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Create placeholder web dist
        run: mkdir -p parkhub-web/dist && echo '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run clippy
        run: |
          cargo clippy --package parkhub-common --all-targets -- -D warnings
          cargo clippy --package parkhub-server --no-default-features --features headless --all-targets -- -D warnings

  test:
    name: Cargo Test
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Create placeholder web dist
        run: mkdir -p parkhub-web/dist && echo '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run tests
        run: |
          cargo test --package parkhub-common --all-targets
          cargo test --package parkhub-server --no-default-features --features headless --all-targets

      - name: Run doc tests
        run: cargo test --package parkhub-common --doc

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parkhub-web

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: parkhub-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run

      - name: Build frontend
        run: npm run build

  # Gate job — branch protection checks this
  ci:
    name: CI
    if: always()
    needs: [check, fmt, clippy, test, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.check.result }}" != "success" ]]; then
            echo "check failed: ${{ needs.check.result }}"
            exit 1
          fi
          if [[ "${{ needs.fmt.result }}" != "success" ]]; then
            echo "fmt failed: ${{ needs.fmt.result }}"
            exit 1
          fi
          if [[ "${{ needs.clippy.result }}" != "success" ]]; then
            echo "clippy failed: ${{ needs.clippy.result }}"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test failed: ${{ needs.test.result }}"
            exit 1
          fi
          if [[ "${{ needs.frontend.result }}" != "success" ]]; then
            echo "frontend failed: ${{ needs.frontend.result }}"
            exit 1
          fi
          echo "All checks passed"
