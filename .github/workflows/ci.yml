name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22.12.0'

jobs:
  actionlint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

  fmt:
    name: Cargo Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  check:
    name: Cargo Check (headless)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run cargo check
        run: |
          cargo check --locked --package parkhub-common --all-targets
          cargo check --locked --package parkhub-server --no-default-features --features headless --all-targets

  clippy:
    name: Cargo Clippy (headless)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run clippy
        run: |
          cargo clippy --locked --package parkhub-common --all-targets -- -D warnings
          cargo clippy --locked --package parkhub-server --no-default-features --features headless --all-targets -- -D warnings -A clippy::cognitive_complexity -A clippy::assigning_clones

  test:
    name: Cargo Test (headless)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [check]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run tests
        run: |
          cargo test --locked --package parkhub-common --all-targets
          cargo test --locked --package parkhub-server --no-default-features --features headless --all-targets

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: parkhub-web
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: parkhub-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

      - name: Build frontend
        run: npm run build

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Build server binary
        run: cargo build --locked --package parkhub-server --no-default-features --features headless

      - name: Run integration tests
        run: cargo test --locked --package parkhub-server --no-default-features --features headless -- integration --test-threads=1
        env:
          RUST_LOG: warn

  required:
    name: Required checks
    if: always()
    needs: [actionlint, fmt, check, clippy, test, frontend, integration]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check results
        env:
          ACTIONLINT: ${{ needs.actionlint.result }}
          CHECK: ${{ needs.check.result }}
          TEST: ${{ needs.test.result }}
          FRONTEND: ${{ needs.frontend.result }}
          FMT: ${{ needs.fmt.result }}
          CLIPPY: ${{ needs.clippy.result }}
          INTEGRATION: ${{ needs.integration.result }}
        run: |
          for check in ACTIONLINT CHECK TEST FRONTEND FMT CLIPPY; do
            if [[ "${!check}" != "success" ]]; then
              echo "REQUIRED: ${check} failed: ${!check}"
              exit 1
            fi
          done
          # TODO(make-required-once-stabilized): integration has 1 real failure in last 24h (cancellation_produces_correct_booking_status)
          if [[ "${INTEGRATION}" != "success" ]]; then
            echo "ADVISORY: INTEGRATION: ${INTEGRATION}"
          fi
          echo "All checks passed"
