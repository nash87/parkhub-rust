name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: '1.88.0'
  NODE_VERSION: '22.12.0'

jobs:
  actionlint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.12

  fmt:
    name: Cargo Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  check:
    name: Cargo Check (headless)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run cargo check
        run: |
          cargo check --locked --package parkhub-common --all-targets
          cargo check --locked --package parkhub-server --no-default-features --features headless --all-targets

  clippy:
    name: Cargo Clippy (headless)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run clippy
        run: |
          cargo clippy --locked --package parkhub-common --all-targets -- -D warnings
          cargo clippy --locked --package parkhub-server --no-default-features --features headless --all-targets -- -D warnings -A clippy::cognitive_complexity -A clippy::assigning_clones

  test:
    name: Cargo Test (headless)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [check]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run tests
        run: |
          cargo test --locked --package parkhub-common --all-targets
          cargo test --locked --package parkhub-server --no-default-features --features headless --all-targets

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: parkhub-web
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: parkhub-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

      - name: Build frontend
        run: npm run build

  ci:
    name: CI
    if: always()
    needs: [actionlint, fmt, check, clippy, test, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.actionlint.result }}" == "failure" ]]; then
            echo "actionlint advisory: ${{ needs.actionlint.result }}"
          fi
          if [[ "${{ needs.check.result }}" != "success" ]]; then
            echo "check failed: ${{ needs.check.result }}"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test failed: ${{ needs.test.result }}"
            exit 1
          fi
          if [[ "${{ needs.frontend.result }}" != "success" ]]; then
            echo "frontend failed: ${{ needs.frontend.result }}"
            exit 1
          fi
          if [[ "${{ needs.fmt.result }}" == "success" ]]; then
            echo "fmt passed"
          elif [[ "${{ needs.fmt.result }}" == "failure" ]]; then
            echo "fmt remains advisory until the pre-existing formatting drift is cleaned up"
          else
            echo "fmt status: ${{ needs.fmt.result }}"
          fi
          if [[ "${{ needs.clippy.result }}" == "success" ]]; then
            echo "clippy passed"
          elif [[ "${{ needs.clippy.result }}" == "failure" ]]; then
            echo "clippy remains advisory until the pre-existing warning backlog is cleaned up"
          else
            echo "clippy status: ${{ needs.clippy.result }}"
          fi
          echo "All checks passed"
