name: CI

on:
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - docs/**
      - CHANGELOG*
      - LICENSE*
      - .gitignore
      - .editorconfig
      - .github/ISSUE_TEMPLATE/**
      - .github/PULL_REQUEST_TEMPLATE.md
      - .github/agents/**
  pull_request:
    branches: [main]
    paths-ignore:
      - CHANGELOG*
      - LICENSE*
      - .gitignore
      - .editorconfig
      - .github/ISSUE_TEMPLATE/**
      - .github/PULL_REQUEST_TEMPLATE.md
      - .github/agents/**
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read  # workflow-wide checkout default; per-job perms override where stricter
  pull-requests: read  # required-checks job reads PR check status to determine green/red gating

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22.12.0'
  DEMO_MODE: 'true'
  PARKHUB_ADMIN_PASSWORD: demo

jobs:
  actionlint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

      - name: Lint YAML manifests
        run: |
          python3 -m pip install --user yamllint
          ~/.local/bin/yamllint -d relaxed .github/workflows docker-compose.yml docker-compose.test.yml render.yaml koyeb.yaml

      - name: Validate CI workflow policy
        run: bash scripts/check-ci-workflow-policy.sh

      - name: Validate Fly config
        run: python3 -c "import pathlib, tomllib; tomllib.loads(pathlib.Path('fly.toml').read_text())"

      - name: Validate Nix/Garnix contract (strict, --require-lock)
        run: make nix-contract-strict

  helm-validate:
    name: Helm validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Validate Helm chart
        run: |
          helm lint ./helm/parkhub
          helm template parkhub ./helm/parkhub > /tmp/rendered-default.yaml
          helm template parkhub ./helm/parkhub --set grafana.dashboardsEnabled=true > /tmp/rendered-grafana.yaml
          helm template parkhub ./helm/parkhub --set pdb.enabled=true > /tmp/rendered-ha.yaml
          helm template parkhub ./helm/parkhub --set monitoring.serviceMonitor.enabled=true > /tmp/rendered-servicemonitor.yaml
          helm template parkhub ./helm/parkhub --set monitoring.prometheusRule.enabled=true > /tmp/rendered-prometheusrule.yaml
          python3 -m pip install --user pyyaml
          python3 - <<'PY'
          import pathlib, yaml
          for path in pathlib.Path('/tmp').glob('rendered-*.yaml'):
              list(yaml.safe_load_all(path.read_text()))
          PY

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        # Advisory until GitHub Dependency Graph is consistently available for this repo.
        continue-on-error: true
        with:
          fail-on-severity: high
          # Mirror of `.github/workflows/dependency-review.yml` deny-list —
          # keep both in sync. SPDX identifiers verified against
          # https://spdx.org/licenses/ (BUSL-1.1, NOT BSL-1.1 which is Boost).
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0, AGPL-3.0-or-later, BUSL-1.1, SSPL-1.0, FSL-1.0-ALv2, FSL-1.0-MIT, FSL-1.1-MIT

  local-ci-attestation:
    name: fop local CI attestation
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    # Hard cap of 40 min accommodates the adaptive backoff schedule (~36 min)
    # plus GHA queue/runner startup. Shorter windows collapsed Required checks
    # when local-CI ran under multi-tab fop queue load.
    timeout-minutes: 40
    permissions:
      contents: read  # checkout-only (no writes from this gate job)
      statuses: write  # cross-token visibility: workflow GITHUB_TOKEN with read-only cannot see PAT-posted statuses; write scope is the documented workaround per github.com/orgs/community/discussions/40769
    steps:
      - name: Require fop local CI commit status (adaptive backoff)
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          CONTEXT: fop/local-ci/pr
        run: |
          # Adaptive backoff: short polls early (catch fast posts), longer
          # polls later (avoid API hammering during real waits).
          # Total ~36.5 min plus a final read with 18 API reads instead of hammering the
          # installation token during GitHub's shared rate-limit windows.
          # Fail-fast on explicit failure/error states (don't wait the full window).
          delays=(10 20 30 60 90 120 120 120 180 180 180 180 180 180 180 180 180)
          status=""
          combined=""
          last_api_error=""
          read_local_ci_status() {
            api_error="$(mktemp)"
            if status_line="$(
              gh api "repos/${REPO}/commits/${SHA}/status" \
                --jq "[.state, (([.statuses[] | select(.context == \"${CONTEXT}\")] | sort_by(.created_at) | reverse | .[0].state) // \"\")] | @tsv" \
                2>"${api_error}"
            )"; then
              last_api_error=""
              combined="${status_line%%$'\t'*}"
              status="${status_line#*$'\t'}"
              if [[ "${status_line}" != *$'\t'* ]]; then
                status=""
              fi
            else
              last_api_error="$(tr '\n' ' ' < "${api_error}")"
              combined=""
              status=""
              echo "::warning::Could not query commit-status API for ${SHA}: ${last_api_error:-unknown gh api error}"
              public_api_error="$(mktemp)"
              if status_line="$(
                curl -fsSL \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${REPO}/commits/${SHA}/status" \
                  2>"${public_api_error}" \
                  | jq -r --arg context "${CONTEXT}" \
                    '[.state, (([.statuses[] | select(.context == $context)] | sort_by(.created_at) | reverse | .[0].state) // "")] | @tsv'
              )"; then
                last_api_error=""
                combined="${status_line%%$'\t'*}"
                status="${status_line#*$'\t'}"
                if [[ "${status_line}" != *$'\t'* ]]; then
                  status=""
                fi
              else
                public_error="$(tr '\n' ' ' < "${public_api_error}")"
                echo "::warning::Unauthenticated commit-status fallback also failed for ${SHA}: ${public_error:-unknown curl/jq error}"
              fi
              rm -f "${public_api_error}"
            fi
            rm -f "${api_error}"
            # Some token/app combinations can see the combined commit-status
            # state before the individual PAT-authored status row. The combined
            # endpoint only covers commit statuses, not check runs, so success
            # here is a valid local-CI attestation fallback.
            if [[ -z "${status}" && "${combined}" == "success" ]]; then
              status="success"
            fi
          }

          for delay in "${delays[@]}"; do
            read_local_ci_status
            echo "Observed combined=${combined:-unknown} ${CONTEXT}=${status:-pending} on ${SHA} (elapsed=${SECONDS}s)"
            case "$status" in
              success)
                echo "${CONTEXT}=success after ${SECONDS}s"
                exit 0
                ;;
              failure|error)
                echo "::error::${CONTEXT}=${status} — local-CI explicitly failed; see commit status for details"
                gh api "repos/${REPO}/commits/${SHA}/status" \
                  --jq ".statuses[] | select(.context == \"${CONTEXT}\") | {state, description, target_url, created_at}" \
                  || true
                exit 1
                ;;
            esac
            echo "Waiting ${delay}s for ${CONTEXT} on ${SHA} (current=${status:-pending}, combined=${combined:-unknown}, elapsed=${SECONDS}s)..."
            sleep "$delay"
          done
          read_local_ci_status
          echo "Observed combined=${combined:-unknown} ${CONTEXT}=${status:-pending} on ${SHA} (elapsed=${SECONDS}s)"
          case "$status" in
            success)
              echo "${CONTEXT}=success after ${SECONDS}s"
              exit 0
              ;;
            failure|error)
              echo "::error::${CONTEXT}=${status} — local-CI explicitly failed; see commit status for details"
              gh api "repos/${REPO}/commits/${SHA}/status" \
                --jq ".statuses[] | select(.context == \"${CONTEXT}\") | {state, description, target_url, created_at}" \
                || true
              exit 1
              ;;
          esac
          echo "::error::Timed out waiting for ${CONTEXT}=success after ${SECONDS}s."
          if [[ -n "${last_api_error}" ]]; then
            echo "::error::Last commit-status API error: ${last_api_error}"
          fi
          echo "Run locally:"
          echo "  .github/scripts/fop-local-ci.sh --profile pr --post-status"
          exit 1

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2.79.2
        with:
          tool: cargo-deny

      - name: Run cargo-deny
        run: cargo deny check advisories bans licenses sources

  fmt:
    name: Cargo Format Check
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.user.type == 'Bot' || contains(github.event.pull_request.labels.*.name, 'github-ci-full')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  check:
    name: Cargo Check (headless)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.user.type == 'Bot' || contains(github.event.pull_request.labels.*.name, 'github-ci-full')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run cargo check
        run: |
          cargo check --locked --package parkhub-common --all-targets
          cargo check --locked --package parkhub-server --no-default-features --features headless --all-targets

  client-check:
    name: Desktop Client Check
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.user.type == 'Bot' || contains(github.event.pull_request.labels.*.name, 'github-ci-full')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libfontconfig1-dev

      - name: Check desktop client
        run: cargo check --locked --package parkhub-client --all-targets

  clippy:
    name: Cargo Clippy (headless)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.user.type == 'Bot' || contains(github.event.pull_request.labels.*.name, 'github-ci-full')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run clippy
        run: |
          cargo clippy --locked --package parkhub-common --all-targets -- -D warnings
          cargo clippy --locked --package parkhub-server --no-default-features --features headless --all-targets -- -D warnings -A clippy::cognitive_complexity -A clippy::assigning_clones

  test:
    name: Cargo Test (headless)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.user.type == 'Bot' || contains(github.event.pull_request.labels.*.name, 'github-ci-full')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [check]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run tests
        run: |
          cargo test --locked --package parkhub-common --all-targets
          cargo test --locked --package parkhub-server --no-default-features --features headless --all-targets

  frontend:
    name: Frontend Build & Test
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.user.type == 'Bot' || contains(github.event.pull_request.labels.*.name, 'github-ci-full')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: parkhub-web
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: parkhub-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

      - name: Build frontend
        run: npm run build

  integration:
    name: Integration Tests
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.user.type == 'Bot' || contains(github.event.pull_request.labels.*.name, 'github-ci-full')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Build server binary
        run: cargo build --locked --package parkhub-server --no-default-features --features headless

      - name: Run integration tests
        run: cargo test --locked --package parkhub-server --no-default-features --features headless -- integration --test-threads=1
        env:
          RUST_LOG: warn

  types-drift:
    name: TypeScript types drift
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.user.type == 'Bot' || contains(github.event.pull_request.labels.*.name, 'github-ci-full')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      # Runs the gen-types feature which triggers (a) ts-rs auto-generated
      # hidden export_bindings_* tests that emit one .ts per Rust type, and
      # (b) the explicit ts_export integration test that stamps a warning
      # header on every file. See parkhub-server/tests/ts_export.rs.
      - name: Regenerate TypeScript bindings from Rust
        run: cargo test --locked --features gen-types -p parkhub-server --test ts_export -- --nocapture

      - name: Fail if generated types drifted
        run: |
          # Two checks cover both drift directions:
          #   1. git diff --exit-code catches modifications + deletions of
          #      tracked files (Rust struct field renamed, type removed
          #      after ts_export purged its orphan, etc.).
          #   2. git status --porcelain catches untracked files — a new
          #      #[derive(TS)] + #[ts(export)] type where the resulting
          #      .ts was never git-added. git diff would silently pass.
          # Both must be empty for the gate to succeed.
          drift=0
          if ! git diff --exit-code parkhub-web/src/generated/; then
            echo "::error::parkhub-web/src/generated/ has modified or deleted files (drift from Rust source)."
            drift=1
          fi
          untracked="$(git status --porcelain parkhub-web/src/generated/)"
          if [ -n "$untracked" ]; then
            echo "::error::parkhub-web/src/generated/ has untracked or modified files not yet committed:"
            printf '%s\n' "$untracked"
            drift=1
          fi
          if [ "$drift" -ne 0 ]; then
            echo "Regenerate locally with:"
            echo "  cargo test --features gen-types -p parkhub-server --test ts_export -- --nocapture"
            echo "and commit the updated files."
            exit 1
          fi
          echo "Generated TypeScript types match the Rust source."

  openapi-drift:
    name: OpenAPI drift
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.user.type == 'Bot' || contains(github.event.pull_request.labels.*.name, 'github-ci-full')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: parkhub-web/package-lock.json

      - name: Build frontend (rust_embed source)
        run: cd parkhub-web && npm ci && npm run build

      - name: Build server
        run: cargo build --locked --release -p parkhub-server --no-default-features --features 'full,headless'

      - name: Start server in background
        shell: bash
        run: |
          mkdir -p /tmp/parkhub-drift-db
          ./target/release/parkhub-server --headless --unattended --port 18181 --data-dir /tmp/parkhub-drift-db > /tmp/parkhub-drift.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          READY=0
          for _i in $(seq 1 45); do
            if curl -sf http://localhost:18181/health > /dev/null 2>&1; then
              READY=1
              break
            fi
            sleep 1
          done
          if [ "$READY" -ne 1 ]; then
            echo 'Server did not become healthy in time'
            tail -n 50 /tmp/parkhub-drift.log
            exit 1
          fi

      - name: Regenerate Rust OpenAPI snapshot
        run: ./scripts/dump-openapi.sh 18181

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true

      - name: Fail if snapshot drifted
        run: |
          if ! git diff --exit-code docs/openapi/rust.json; then
            echo "::error::docs/openapi/rust.json is out of sync with the code."
            echo "Run ./scripts/dump-openapi.sh locally (against a running server on 18181) and commit the updated snapshot."
            exit 1
          fi
          echo "Rust OpenAPI snapshot matches the current code."

  required:
    name: Required checks
    if: always()
    needs: [actionlint, helm-validate, dependency-review, local-ci-attestation, cargo-deny, fmt, check, client-check, clippy, test, frontend, integration, openapi-drift, types-drift]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check results
        env:
          ACTIONLINT: ${{ needs.actionlint.result }}
          HELM_VALIDATE: ${{ needs.helm-validate.result }}
          DEPENDENCY_REVIEW: ${{ needs.dependency-review.result }}
          LOCAL_CI: ${{ needs.local-ci-attestation.result }}
          EVENT_NAME: ${{ github.event_name }}
          LOCAL_CI_REQUIRED: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.type != 'Bot' }}
          CARGO_DENY: ${{ needs.cargo-deny.result }}
          CHECK: ${{ needs.check.result }}
          CLIENT_CHECK: ${{ needs.client-check.result }}
          TEST: ${{ needs.test.result }}
          FRONTEND: ${{ needs.frontend.result }}
          FMT: ${{ needs.fmt.result }}
          CLIPPY: ${{ needs.clippy.result }}
          INTEGRATION: ${{ needs.integration.result }}
          OPENAPI_DRIFT: ${{ needs.openapi-drift.result }}
          TYPES_DRIFT: ${{ needs.types-drift.result }}
        run: |
          for check in ACTIONLINT HELM_VALIDATE CARGO_DENY; do
            if [[ "${!check}" != "success" ]]; then
              echo "REQUIRED: ${check} failed: ${!check}"
              exit 1
            fi
          done
          if [[ "${LOCAL_CI_REQUIRED}" == "true" && "${LOCAL_CI}" != "success" ]]; then
            echo "REQUIRED: LOCAL_CI failed: ${LOCAL_CI}"
            exit 1
          fi
          if [[ "${EVENT_NAME}" == "pull_request" && "${LOCAL_CI_REQUIRED}" != "true" ]]; then
            echo "LOCAL-FIRST: local CI attestation skipped for bot or fork PR"
          fi
          for check in CHECK CLIENT_CHECK TEST FRONTEND FMT CLIPPY OPENAPI_DRIFT TYPES_DRIFT; do
            if [[ "${!check}" != "success" && "${!check}" != "skipped" ]]; then
              echo "REQUIRED: ${check} failed: ${!check}"
              exit 1
            fi
            if [[ "${!check}" == "skipped" ]]; then
              echo "LOCAL-FIRST: ${check} skipped on PR; covered by fop/local-ci/pr"
            fi
          done
          if [[ "${DEPENDENCY_REVIEW}" != "success" && "${DEPENDENCY_REVIEW}" != "skipped" ]]; then
            echo "REQUIRED: DEPENDENCY_REVIEW failed: ${DEPENDENCY_REVIEW}"
            exit 1
          fi
          # TODO(make-required-once-stabilized): integration has 1 real failure in last 24h (cancellation_produces_correct_booking_status)
          if [[ "${INTEGRATION}" != "success" ]]; then
            echo "ADVISORY: INTEGRATION: ${INTEGRATION}"
          fi
          echo "All checks passed"
