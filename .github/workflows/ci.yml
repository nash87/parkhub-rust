name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Minimal permissions — CI only reads code, no write access needed
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # rust-embed needs the dist folder at compile time; create a placeholder
      # so cargo check works without a full frontend build.
      - name: Create placeholder web dist
        run: mkdir -p parkhub-web/dist && echo '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      # Check only the server-side packages — parkhub-client has Slint/GTK deps
      # that require a full desktop environment and cannot be checked on plain Ubuntu.
      # The client is covered by the Windows build job in release.yml.
      - name: Run cargo check (server + common)
        run: |
          cargo check --package parkhub-common --all-targets
          cargo check --package parkhub-server --no-default-features --features headless --all-targets

  fmt:
    name: Cargo Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Cargo Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Create placeholder web dist
        run: mkdir -p parkhub-web/dist && echo '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      # Clippy only for server-side packages (same reason as cargo check above)
      # Allow dead_code — project is in active development with modules wired up incrementally
      - name: Run clippy (server + common)
        run: |
          cargo clippy --package parkhub-common --all-targets -- -D warnings -A dead_code -A unused -A clippy::field_reassign_with_default -A clippy::format_in_format_args -A clippy::collapsible_if -A clippy::unnecessary_lazy_evaluations -A clippy::needless_borrows_for_generic_args -A clippy::result_large_err -A clippy::new_ret_no_self
          cargo clippy --package parkhub-server --no-default-features --features headless --all-targets -- -D warnings -A dead_code -A unused -A clippy::field_reassign_with_default -A clippy::format_in_format_args -A clippy::collapsible_if -A clippy::unnecessary_lazy_evaluations -A clippy::needless_borrows_for_generic_args -A clippy::result_large_err -A clippy::new_ret_no_self

  test:
    name: Cargo Test
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Create placeholder web dist
        run: mkdir -p parkhub-web/dist && echo '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run tests (server + common)
        run: |
          cargo test --package parkhub-common
          cargo test --package parkhub-server --no-default-features --features headless

  build:
    name: Cargo Build Release
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Create placeholder web dist
        run: mkdir -p parkhub-web/dist && echo '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      # Build the headless server binary — this is what Docker ships
      - name: Build release (headless server)
        run: cargo build --release --package parkhub-server --no-default-features --features headless

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ghcr.io/nash87/parkhub-rust:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
