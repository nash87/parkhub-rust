name: Visual Regression

# Soft-fail visual regression gate (T-1770). Not yet a required check — triage
# diff artifacts in the PR review before requiring this to be green. Once the
# baselines are stable for a few weeks, promote to required in branch
# protection.

on:
  pull_request:
    paths:
      - 'parkhub-server/**'
      - 'parkhub-web/**'
      - 'parkhub-common/**'
      - 'parkhub-client/**'
      - 'e2e/visual.spec.ts'
      - 'e2e/helpers.ts'
      - 'e2e/visual.spec.ts-snapshots/**'
      - 'playwright.config.ts'
      - '.github/workflows/visual-regression.yml'
  workflow_dispatch:

concurrency:
  group: visual-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22.12.0'

jobs:
  visual:
    name: Playwright toHaveScreenshot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Soft-fail: diffs surface as downloadable artifacts but don't block merge.
    continue-on-error: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            parkhub-web/package-lock.json

      - name: Build frontend
        working-directory: parkhub-web
        run: |
          npm ci
          npm run build

      - name: Build server (headless + e2e-bypass)
        # Matches e2e.yml — `e2e-bypass` is required so
        # PARKHUB_DISABLE_RATE_LIMITS actually disables the per-IP login
        # limiter. Without it, 28 sequential logins trip the 5/min bucket.
        run: cargo build --locked --release -p parkhub-server --no-default-features --features 'full,headless,e2e-bypass'

      - name: Start server in background
        shell: bash
        env:
          DEMO_MODE: 'true'
          PARKHUB_ADMIN_PASSWORD: 'demo'
          PARKHUB_DISABLE_RATE_LIMITS: 'true'
        run: |
          ./target/release/parkhub-server --headless --unattended --port 18181 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          READY=0
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:18181/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              READY=1
              break
            fi
            sleep 1
          done
          if [ "$READY" -ne 1 ]; then
            echo 'Server did not become healthy in time'
            exit 1
          fi

      - name: Install Playwright dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual regression suite
        env:
          E2E_BASE_URL: http://127.0.0.1:18181
          CI: 'true'
        run: npx playwright test --project=chromium --workers=1 --reporter=github e2e/visual.spec.ts

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true

      - name: Upload diff artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: visual-regression-diffs
          path: |
            test-results/**/*-diff.png
            test-results/**/*-actual.png
            test-results/**/*-expected.png
            playwright-report/
          retention-days: 14

      - name: Upload full Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-visual-report
          path: playwright-report/
          retention-days: 7
