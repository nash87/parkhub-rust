name: Build & Push Docker Image to GHCR

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GHCR — keeps Rust dep builds fast on subsequent pushes
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64

      - name: Ensure Render env vars
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          SVC="https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}"
          AUTH="Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
          # Per-key PUT: /env-vars/{key} with {"value": "..."}
          for KV in "DEMO_MODE=true" "PARKHUB_ADMIN_PASSWORD=demo" "RUST_LOG=info"; do
            KEY="${KV%%=*}"; VALUE="${KV#*=}"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT "$SVC/env-vars/$KEY" \
              -H "$AUTH" -H "Content-Type: application/json" \
              -d "{\"value\":\"$VALUE\"}")
            echo "  $KEY → HTTP $HTTP_CODE"
          done

      - name: Deploy to Render
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          curl -sf -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"clear"}'
