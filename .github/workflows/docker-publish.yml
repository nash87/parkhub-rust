name: Release Container

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish_version_tags:
        description: 'Also publish Cargo version tags from the selected ref.'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permissions intentionally empty; each job declares the
# minimum set it needs (publish needs OIDC + GHCR push + SARIF upload;
# deploy-demo needs nothing beyond the secrets it consumes).
permissions: {}

env:
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build, scan, and publish image
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: read  # required for actions/checkout on a private repo
      packages: write  # required to push the OCI image to GHCR
      id-token: write  # required for keyless cosign signing + OIDC build provenance
      attestations: write  # required by actions/attest-build-provenance
      security-events: write  # required to upload the Trivy SARIF result to the Security tab

    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          PUBLISH_VERSION_TAGS: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_version_tags == true }}
        run: |
          set -euo pipefail
          docker_tag_re='^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$'
          semver_re='^[0-9]+[.][0-9]+[.][0-9]+([.-][0-9A-Za-z.-]+)?$'
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          if [[ ! "${cargo_version}" =~ ${semver_re} ]]; then
            echo "::error::Cargo.toml version is not a Docker-tag-safe semver: ${cargo_version}"
            exit 1
          fi
          short_sha="${GITHUB_SHA::7}"
          release_version=""
          ref_tag=""

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ ! "${GITHUB_REF_NAME}" =~ ^v(${semver_re#^}) ]]; then
              echo "::error::Release tag must be v<semver>, got: ${GITHUB_REF_NAME}"
              exit 1
            fi
            release_version="${BASH_REMATCH[1]}"
            if [[ "${release_version}" != "${cargo_version}" ]]; then
              echo "::error::Git tag version (${release_version}) does not match Cargo.toml (${cargo_version})"
              exit 1
            fi
            ref_tag="${GITHUB_REF_NAME}"
          elif [[ "${PUBLISH_VERSION_TAGS}" == "true" ]]; then
            release_version="${cargo_version}"
          fi

          if [[ -n "${ref_tag}" && ! "${ref_tag}" =~ ${docker_tag_re} ]]; then
            echo "::error::Git tag is not a valid Docker tag: ${ref_tag}"
            exit 1
          fi
          if [[ -n "${release_version}" && ! "${release_version}" =~ ${docker_tag_re} ]]; then
            echo "::error::Release version is not a valid Docker tag: ${release_version}"
            exit 1
          fi

          {
            echo "tags<<EOF"
            echo "${IMAGE_REF}:sha-${short_sha}"
            if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
              echo "${IMAGE_REF}:latest"
            fi
            if [[ -n "${ref_tag}" ]]; then
              echo "${IMAGE_REF}:${ref_tag}"
            fi
            if [[ -n "${release_version}" ]]; then
              major_minor="$(printf '%s\n' "${release_version}" | awk -F. '{ print $1 "." $2 }')"
              echo "${IMAGE_REF}:${release_version}"
              echo "${IMAGE_REF}:${major_minor}"
            fi
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.version=${release_version:-${cargo_version}}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-docker-amd64
          cache-to: type=gha,scope=release-docker-amd64,mode=max
          provenance: mode=max
          sbom: true

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        continue-on-error: true
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          limit-severities-for-sarif: true
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        # Advisory: GitHub's SARIF upload API can hit installation rate limits;
        # keep Security tab upload failures from blocking signing or demo deploy.
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Attest image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # T-1789: keyless Sigstore signature on every pushed digest.
      # Uses the ambient GitHub OIDC token — no long-lived keys to rotate.
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: 'v3.0.6'

      - name: Sign container image (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: 'true'
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          cosign sign --yes "${IMAGE_REF}@${IMAGE_DIGEST}"

  deploy-demo:
    name: Deploy demo
    if: github.event_name == 'workflow_dispatch'
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    # Bind the Render secrets to a dedicated GitHub environment so they can
    # be scoped (and optionally protection-ruled) instead of leaking via the
    # default repo secret store. The environment name `demo` should exist in
    # repo Settings → Environments; if it doesn't, the workflow will fail
    # closed (which is the desired behaviour — better than silently using
    # default-scope secrets).
    environment: demo
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
      - name: Skip demo deploy when Render secrets are missing
        if: env.RENDER_API_KEY == '' || env.RENDER_SERVICE_ID == ''
        run: echo "Render demo deploy skipped because required secrets are not configured."

      - name: Trigger Render deploy
        if: env.RENDER_API_KEY != '' && env.RENDER_SERVICE_ID != ''
        run: |
          curl -fsS -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}'
