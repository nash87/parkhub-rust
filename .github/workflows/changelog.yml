name: Changelog

# Regenerates the [Unreleased] section of CHANGELOG.md from git-cliff
# (using conventional-commit message parsing) on every push to main.
# On tag push (v*), promotes [Unreleased] to a new release section. Protected
# main stays immutable: generated changes are proposed through an automation PR.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'docs/**'
      - 'README.md'
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    name: Regenerate CHANGELOG.md
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write       # push the automation branch
      pull-requests: write  # open/update the changelog PR
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PARKHUB_CHANGELOG_TOKEN || github.token }}
          persist-credentials: true

      - name: Run git-cliff
        # MIT/Apache-2.0 — orhun/git-cliff. Reads cliff.toml at repo root.
        # Pinned to the v4.8.0 release commit:
        # https://github.com/orhun/git-cliff-action/releases/tag/v4.8.0
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5
        with:
          config: cliff.toml
          args: --output CHANGELOG.md

      - name: Open changelog PR if changed
        env:
          CHANGELOG_BRANCH: automation/changelog-main
          GH_TOKEN: ${{ secrets.PARKHUB_CHANGELOG_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet CHANGELOG.md; then
            echo "CHANGELOG.md unchanged — skipping commit."
            exit 0
          fi
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::CHANGELOG.md changed, but PARKHUB_CHANGELOG_TOKEN is not configured. Skipping changelog PR creation so main stays green; configure a repo secret with contents:write and pull-requests:write to enable automated changelog PRs that trigger normal PR CI."
            git diff -- CHANGELOG.md
            exit 0
          fi
          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            git switch --create "$CHANGELOG_BRANCH"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ] && [[ "${GITHUB_REF_NAME}" == v* ]]; then
            generated_changelog="$(mktemp)"
            cp CHANGELOG.md "$generated_changelog"
            git fetch origin main
            git switch --create "$CHANGELOG_BRANCH" origin/main
            cp "$generated_changelog" CHANGELOG.md
            rm -f "$generated_changelog"
          else
            echo "CHANGELOG.md changed for ${GITHUB_REF}; not opening a PR for unsupported ref type ${GITHUB_REF_TYPE}."
            git diff -- CHANGELOG.md
            exit 0
          fi
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md unchanged on ${CHANGELOG_BRANCH} — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(changelog): regenerate from git-cliff"
          if git ls-remote --exit-code --heads origin "$CHANGELOG_BRANCH" >/dev/null 2>&1; then
            git fetch origin "refs/heads/${CHANGELOG_BRANCH}:refs/remotes/origin/${CHANGELOG_BRANCH}"
            git push --force-with-lease origin "HEAD:${CHANGELOG_BRANCH}"
          else
            echo "Remote branch ${CHANGELOG_BRANCH} does not exist yet; pushing a new branch."
            git push origin "HEAD:${CHANGELOG_BRANCH}"
          fi
          pr_json="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$CHANGELOG_BRANCH" --state all --json number,state --limit 1)"
          pr_number="$(jq -r '.[0].number // ""' <<<"$pr_json")"
          pr_state="$(jq -r '.[0].state // ""' <<<"$pr_json")"
          if [ -n "$pr_number" ]; then
            if [ "$pr_state" = "CLOSED" ]; then
              gh pr reopen "$pr_number" --repo "$GITHUB_REPOSITORY"
              echo "Reopened changelog PR #${pr_number}."
            else
              echo "Updated changelog PR #${pr_number}."
            fi
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$CHANGELOG_BRANCH" \
              --title "chore(changelog): regenerate from git-cliff" \
              --body "Generated by the Changelog workflow for ${GITHUB_SHA}."
          fi
