name: Dependency Review

on:
  pull_request:
    branches: [main]

concurrency:
  group: dependency-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0
          # Slint ships under a tri-license (GPL-3.0 OR Royalty-free OR Commercial).
          # ParkHub uses the non-GPL arm; deny.toml records the same exception.
          allow-dependencies-licenses: >-
            pkg:cargo/slint,
            pkg:cargo/slint-build,
            pkg:cargo/slint-macros,
            pkg:cargo/i-slint-core,
            pkg:cargo/i-slint-backend-selector,
            pkg:cargo/i-slint-backend-winit,
            pkg:cargo/i-slint-backend-linuxkms,
            pkg:cargo/i-slint-common,
            pkg:cargo/i-slint-compiler,
            pkg:cargo/i-slint-core-macros,
            pkg:cargo/i-slint-renderer-femtovg,
            pkg:cargo/i-slint-renderer-skia,
            pkg:cargo/i-slint-renderer-software
