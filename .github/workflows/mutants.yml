name: Mutation Testing (nightly)

# Runs cargo-mutants against parkhub-common on a nightly cron. Reports
# escaped mutants as artifacts for morning triage. Not a blocking gate —
# surfaces coverage gaps, doesn't gate merges. See T-1734.
#
# v1 scope: parkhub-common only. parkhub-server is too big for a single
# 3-hour nightly run; expand scope later once baseline kill rate is known.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: mutants-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  mutants:
    name: cargo-mutants sweep
    runs-on: ubuntu-latest
    timeout-minutes: 180
    continue-on-error: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.12.0'
          cache: npm
          cache-dependency-path: parkhub-web/package-lock.json

      - name: Build frontend (rust_embed needs dist/)
        run: cd parkhub-web && npm ci && npm run build

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked --version '^25'

      - name: Run cargo-mutants (parkhub-common)
        run: cargo mutants --json --timeout 300 --test-package parkhub-common

      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cargo-mutants-report
          path: mutants.out/
          retention-days: 30
          if-no-files-found: warn
