name: Labeler

# Auto-apply path-based labels on every PR open / sync. Pairs with
# .github/labeler.yml. Lets release.yml categorize generated release notes
# without manual labeling.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read # actions/labeler reads the base-branch .github/labeler.yml config

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Apply path labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # actions/labeler reads the base-branch .github/labeler.yml config
      pull-requests: write # actions/labeler applies and syncs path labels on pull requests
    steps:
      - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.0
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
