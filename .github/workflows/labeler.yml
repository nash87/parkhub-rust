name: Labeler

# Auto-apply path-based labels on every PR open / sync. Pairs with
# .github/labeler.yml. Lets release.yml categorize generated release notes
# without manual labeling.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Apply path labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v6.0.0
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
