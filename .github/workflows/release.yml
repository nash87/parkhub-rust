name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22.12.0'

jobs:
  validate-tag:
    name: Validate release ref + version surfaces
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Require v* tag ref
        run: |
          if [[ ! "${GITHUB_REF}" =~ ^refs/tags/v ]]; then
            echo "workflow_dispatch must target a v* tag ref"
            exit 1
          fi

      - name: Require tag and version surfaces to match
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 <<'PY'
          import json
          import os
          import pathlib
          import tomllib

          root = pathlib.Path(".")
          release_tag = os.environ["RELEASE_TAG"]
          if not release_tag.startswith("v"):
              raise SystemExit(f"release ref must be a v* tag, got: {release_tag}")

          expected_version = release_tag[1:]
          cargo_version = tomllib.loads((root / "Cargo.toml").read_text())["workspace"]["package"]["version"]
          root_package_version = json.loads((root / "package.json").read_text())["version"]
          web_package_version = json.loads((root / "parkhub-web" / "package.json").read_text())["version"]

          versions = {
              "git tag": expected_version,
              "Cargo.toml [workspace.package].version": cargo_version,
              "package.json version": root_package_version,
              "parkhub-web/package.json version": web_package_version,
          }

          mismatches = {name: value for name, value in versions.items() if value != expected_version}
          if mismatches:
              print("Release version parity check failed:")
              for name, value in versions.items():
                  print(f"  {name}: {value}")
              raise SystemExit(1)

          print(f"Release version parity verified: {expected_version}")
          PY

  build-linux:
    name: Build Linux
    needs: [validate-tag]
    if: always() && (needs.validate-tag.result == 'success' || needs.validate-tag.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libfontconfig1-dev

      - name: Setup Node.js
        # No `cache: npm` — release tags must not consume or populate caches
        # that PR runs can write to, or a malicious PR could poison a tag
        # build via the shared cache key. Cold install is acceptable on the
        # release path.
        # Justification (cache-poisoning): cache: npm is intentionally NOT set;
        # setup-node v6 only enables npm caching when the `cache:` input is
        # provided. With no `cache:` key here, the action does not read or
        # write any cache, so the tag-build cache-poisoning attack class
        # does not apply. Suppression is on the `uses:` line below.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 # zizmor: ignore[cache-poisoning] cache: npm not set; no cache I/O on release path
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build web frontend
        working-directory: parkhub-web
        run: |
          npm ci
          npm run build

      - name: Build server (headless)
        run: cargo build --locked --release --package parkhub-server --no-default-features --features headless

      - name: Build client
        run: cargo build --locked --release --package parkhub-client

      - name: Create portable package
        run: |
          mkdir -p parkhub-linux-x64
          cp target/release/parkhub-server parkhub-linux-x64/
          cp target/release/parkhub parkhub-linux-x64/
          cp README.md LICENSE parkhub-linux-x64/
          mkdir -p parkhub-linux-x64/parkhub-data
          touch parkhub-linux-x64/parkhub-data/.portable
          tar -czvf parkhub-linux-x64.tar.gz parkhub-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: parkhub-linux-x64
          path: parkhub-linux-x64.tar.gz
          retention-days: 14

  build-linux-arm64:
    name: Build Linux ARM64
    needs: [validate-tag]
    if: always() && (needs.validate-tag.result == 'success' || needs.validate-tag.result == 'skipped')
    # GitHub-hosted ARM runners (GA since March 2025) — no cross-compile needed.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libfontconfig1-dev

      - name: Setup Node.js
        # No `cache: npm` — release tags must not consume or populate caches
        # that PR runs can write to, or a malicious PR could poison a tag
        # build via the shared cache key. Cold install is acceptable on the
        # release path.
        # Justification (cache-poisoning): cache: npm is intentionally NOT set;
        # setup-node v6 only enables npm caching when the `cache:` input is
        # provided. With no `cache:` key here, the action does not read or
        # write any cache, so the tag-build cache-poisoning attack class
        # does not apply. Suppression is on the `uses:` line below.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 # zizmor: ignore[cache-poisoning] cache: npm not set; no cache I/O on release path
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build web frontend
        working-directory: parkhub-web
        run: |
          npm ci
          npm run build

      - name: Build server (headless)
        run: cargo build --locked --release --package parkhub-server --no-default-features --features headless

      - name: Build client
        run: cargo build --locked --release --package parkhub-client

      - name: Create portable package
        run: |
          mkdir -p parkhub-linux-arm64
          cp target/release/parkhub-server parkhub-linux-arm64/
          cp target/release/parkhub parkhub-linux-arm64/
          cp README.md LICENSE parkhub-linux-arm64/
          mkdir -p parkhub-linux-arm64/parkhub-data
          touch parkhub-linux-arm64/parkhub-data/.portable
          tar -czvf parkhub-linux-arm64.tar.gz parkhub-linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: parkhub-linux-arm64
          path: parkhub-linux-arm64.tar.gz
          retention-days: 14

  build-macos:
    name: Build macOS (universal)
    needs: [validate-tag]
    if: always() && (needs.validate-tag.result == 'success' || needs.validate-tag.result == 'skipped')
    # macos-latest is Apple Silicon by default now; we cross-build to x86_64
    # too and lipo the results into a universal binary so one archive runs
    # on both Intel and Apple Silicon.
    runs-on: macos-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      # macos-latest is now arm64 and rust-toolchain doesn't always cross-install
      # the x86_64 target. Explicit rustup fallback guarantees both are present.
      - name: Ensure both macOS targets installed
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          rustup target list --installed

      # Justification (cache-poisoning): lookup-only: true means the cache
      # is read-only for this run and never written. A malicious PR therefore
      # cannot poison this tag build's cache (PR builds do not share the
      # `macos-release` cache key, and this step never saves). Suppression
      # is on the `uses:` line below.
      - name: Rust cache (macOS)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 # zizmor: ignore[cache-poisoning] lookup-only: true; never writes
        with:
          workspaces: "."
          key: macos-release
          lookup-only: true

      # OpenSSL is now built from source (vendored) by openssl-sys per target —
      # see parkhub-server/Cargo.toml [target.'cfg(target_os = "macos")']. No
      # Homebrew install needed; Homebrew's arm64 openssl can't link into the
      # x86_64 leg of the universal build anyway.

      - name: Setup Node.js
        # No `cache: npm` — release tags must not consume or populate caches
        # that PR runs can write to, or a malicious PR could poison a tag
        # build via the shared cache key. Cold install is acceptable on the
        # release path.
        # Justification (cache-poisoning): cache: npm is intentionally NOT set;
        # setup-node v6 only enables npm caching when the `cache:` input is
        # provided. With no `cache:` key here, the action does not read or
        # write any cache, so the tag-build cache-poisoning attack class
        # does not apply. Suppression is on the `uses:` line below.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 # zizmor: ignore[cache-poisoning] cache: npm not set; no cache I/O on release path
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build web frontend
        working-directory: parkhub-web
        run: |
          npm ci
          npm run build

      - name: Build aarch64 (Apple Silicon)
        run: |
          cargo build --locked --release --target aarch64-apple-darwin --package parkhub-server --no-default-features --features headless
          cargo build --locked --release --target aarch64-apple-darwin --package parkhub-client

      - name: Build x86_64 (Intel)
        run: |
          cargo build --locked --release --target x86_64-apple-darwin --package parkhub-server --no-default-features --features headless
          cargo build --locked --release --target x86_64-apple-darwin --package parkhub-client

      - name: Create universal binaries via lipo
        run: |
          mkdir -p parkhub-macos-universal
          lipo -create -output parkhub-macos-universal/parkhub-server \
            target/aarch64-apple-darwin/release/parkhub-server \
            target/x86_64-apple-darwin/release/parkhub-server
          lipo -create -output parkhub-macos-universal/parkhub \
            target/aarch64-apple-darwin/release/parkhub \
            target/x86_64-apple-darwin/release/parkhub
          cp README.md LICENSE parkhub-macos-universal/
          mkdir -p parkhub-macos-universal/parkhub-data
          touch parkhub-macos-universal/parkhub-data/.portable
          tar -czvf parkhub-macos-universal.tar.gz parkhub-macos-universal

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: parkhub-macos-universal
          path: parkhub-macos-universal.tar.gz
          retention-days: 14

  build-windows:
    name: Build Windows
    needs: [validate-tag]
    if: always() && (needs.validate-tag.result == 'success' || needs.validate-tag.result == 'skipped')
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Justification (cache-poisoning): lookup-only: true means the cache
      # is read-only for this run and never written. A malicious PR therefore
      # cannot poison this tag build's cache (PR builds do not share the
      # `windows-release` cache key, and this step never saves). Suppression
      # is on the `uses:` line below.
      - name: Rust cache (Windows)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 # zizmor: ignore[cache-poisoning] lookup-only: true; never writes
        with:
          workspaces: "."
          key: windows-release
          lookup-only: true

      - name: Install OpenSSL (vcpkg)
        run: |
          vcpkg install openssl:x64-windows-static-md
          echo "OPENSSL_DIR=C:\vcpkg\installed\x64-windows-static-md" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV

      - name: Setup Node.js
        # No `cache: npm` — release tags must not consume or populate caches
        # that PR runs can write to, or a malicious PR could poison a tag
        # build via the shared cache key. Cold install is acceptable on the
        # release path.
        # Justification (cache-poisoning): cache: npm is intentionally NOT set;
        # setup-node v6 only enables npm caching when the `cache:` input is
        # provided. With no `cache:` key here, the action does not read or
        # write any cache, so the tag-build cache-poisoning attack class
        # does not apply. Suppression is on the `uses:` line below.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 # zizmor: ignore[cache-poisoning] cache: npm not set; no cache I/O on release path
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build web frontend
        working-directory: parkhub-web
        run: |
          npm ci
          npm run build

      - name: Build server (headless)
        run: cargo build --locked --release --package parkhub-server --no-default-features --features headless

      - name: Build client
        run: cargo build --locked --release --package parkhub-client

      - name: Create portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path parkhub-windows-x64
          Copy-Item target/release/parkhub-server.exe parkhub-windows-x64/
          Copy-Item target/release/parkhub.exe parkhub-windows-x64/
          Copy-Item README.md parkhub-windows-x64/
          Copy-Item LICENSE parkhub-windows-x64/
          New-Item -ItemType Directory -Force -Path parkhub-windows-x64/parkhub-data
          New-Item -ItemType File -Force -Path parkhub-windows-x64/parkhub-data/.portable
          Compress-Archive -Path parkhub-windows-x64 -DestinationPath parkhub-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: parkhub-windows-x64
          path: parkhub-windows-x64.zip
          retention-days: 14

  # ─── Tauri desktop installers ─────────────────────────────────────────────
  # The headless `parkhub-server` portable bundles above (build-linux*,
  # build-macos, build-windows) ship the server-side artefact. The three
  # `tauri-*` jobs below build the full ParkHub *desktop app* (Tauri 2 shell
  # wrapping the Astro/React frontend) and produce native installers:
  #   Linux   → .deb + .rpm + .AppImage
  #   macOS   → .dmg + .app bundle (universal binary via two-target lipo)
  #   Windows → .msi (WiX) + .exe (NSIS)
  # tauri-action runs `cargo tauri build` which honours
  # `parkhub-desktop/tauri.conf.json::build.beforeBuildCommand` to compile
  # the web frontend first. tauri-action is MIT licensed (commercially safe).
  # Windows code-signing intentionally skipped — no Authenticode cert
  # available; the installer is still produced and works, just SmartScreen
  # will prompt on first run until a cert is wired in (issue: future task).
  # macOS is unsigned/unnotarised for the same reason; users must run
  # `xattr -d com.apple.quarantine ParkHub.app` on first launch.

  tauri-linux:
    name: Tauri desktop (Linux)
    needs: [validate-tag]
    if: always() && (needs.validate-tag.result == 'success' || needs.validate-tag.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install Tauri Linux dependencies
        # webkit2gtk + ayatana-appindicator are the runtime libs Tauri 2
        # links against on Linux; the rest are the AppImage / .deb / .rpm
        # toolchain `cargo tauri build` shells out to.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            file

      - name: Setup Node.js
        # Justification (cache-poisoning): cache: npm is intentionally NOT set;
        # setup-node v6 only enables npm caching when the `cache:` input is
        # provided. With no `cache:` key here, the action does not read or
        # write any cache, so the tag-build cache-poisoning attack class
        # does not apply. Suppression is on the `uses:` line below.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 # zizmor: ignore[cache-poisoning] cache: npm not set; no cache I/O on release path
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install web dependencies
        # tauri-action's beforeBuildCommand runs `npm run build` but does
        # not install deps; we do that here so the cargo tauri build can
        # find a populated node_modules.
        working-directory: parkhub-web
        run: npm ci

      - name: Build Tauri bundles
        # tauri-action@v0.6.2 — MIT licensed.
        # `projectPath` points at the Tauri crate; `args: --bundles deb,rpm,appimage`
        # enumerates the three Linux targets explicitly so the build never
        # depends on host-detection heuristics.
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        with:
          projectPath: parkhub-desktop
          args: --bundles deb,rpm,appimage

      - name: Stage installers
        # Tauri writes into target/release/bundle/{deb,rpm,appimage}/. We
        # collect everything into a single zip so it survives the GitHub
        # artifact upload as one logical unit.
        run: |
          set -euo pipefail
          mkdir -p parkhub-desktop-linux-x64
          # `find` rather than glob: bundle layout differs slightly between
          # cargo-tauri versions and we'd rather pick up *.deb/*.rpm/*.AppImage
          # wherever they land.
          find target/release/bundle -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) \
            -exec cp {} parkhub-desktop-linux-x64/ \;
          ls -la parkhub-desktop-linux-x64/

      - name: Package installers
        run: |
          zip -r parkhub-desktop-linux-x64.zip parkhub-desktop-linux-x64/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: parkhub-desktop-linux-x64
          path: parkhub-desktop-linux-x64.zip
          retention-days: 14

  tauri-macos:
    name: Tauri desktop (macOS universal)
    needs: [validate-tag]
    if: always() && (needs.validate-tag.result == 'success' || needs.validate-tag.result == 'skipped')
    runs-on: macos-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust (universal targets)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Ensure both macOS targets installed
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          rustup target list --installed

      - name: Setup Node.js
        # Justification (cache-poisoning): cache: npm is intentionally NOT set;
        # setup-node v6 only enables npm caching when the `cache:` input is
        # provided. With no `cache:` key here, the action does not read or
        # write any cache, so the tag-build cache-poisoning attack class
        # does not apply. Suppression is on the `uses:` line below.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 # zizmor: ignore[cache-poisoning] cache: npm not set; no cache I/O on release path
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install web dependencies
        working-directory: parkhub-web
        run: npm ci

      - name: Build Tauri bundles (universal)
        # `--target universal-apple-darwin` instructs cargo-tauri to build
        # for both arm64 + x86_64 and lipo them into a single .app/.dmg.
        # No code-signing or notarisation: ASC cert + team-id env vars are
        # absent. Users must run `xattr -d com.apple.quarantine ParkHub.app`
        # to bypass Gatekeeper on first launch — documented in the release
        # notes generator (TODO future task: hook up codesign + notarytool).
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        with:
          projectPath: parkhub-desktop
          args: --target universal-apple-darwin --bundles dmg,app

      - name: Stage installers
        run: |
          set -euo pipefail
          mkdir -p parkhub-desktop-macos
          find target/universal-apple-darwin/release/bundle -type f \
            \( -name '*.dmg' \) \
            -exec cp {} parkhub-desktop-macos/ \;
          # The .app is a directory — tar it so we can ship it inside the
          # outer zip without losing the bundle structure.
          find target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -type d -name '*.app' \
            | while read -r appdir; do
                tar -czf "parkhub-desktop-macos/$(basename "$appdir").tar.gz" -C "$(dirname "$appdir")" "$(basename "$appdir")"
              done
          ls -la parkhub-desktop-macos/

      - name: Package installers
        run: |
          zip -r parkhub-desktop-macos.dmg.zip parkhub-desktop-macos/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: parkhub-desktop-macos
          path: parkhub-desktop-macos.dmg.zip
          retention-days: 14

  tauri-windows:
    name: Tauri desktop (Windows)
    needs: [validate-tag]
    if: always() && (needs.validate-tag.result == 'success' || needs.validate-tag.result == 'skipped')
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install OpenSSL (vcpkg)
        run: |
          vcpkg install openssl:x64-windows-static-md
          echo "OPENSSL_DIR=C:\vcpkg\installed\x64-windows-static-md" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV

      - name: Setup Node.js
        # Justification (cache-poisoning): cache: npm is intentionally NOT set;
        # setup-node v6 only enables npm caching when the `cache:` input is
        # provided. With no `cache:` key here, the action does not read or
        # write any cache, so the tag-build cache-poisoning attack class
        # does not apply. Suppression is on the `uses:` line below.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 # zizmor: ignore[cache-poisoning] cache: npm not set; no cache I/O on release path
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install web dependencies
        working-directory: parkhub-web
        run: npm ci

      - name: Build Tauri bundles
        # No `WINDOWS_CERTIFICATE` / `WINDOWS_CERTIFICATE_PASSWORD` env vars
        # are passed in — the Authenticode signing step is skipped. The .msi
        # and .exe are produced unsigned; SmartScreen will prompt on first
        # run until a cert is wired in (future task: import EV cert into
        # repo Secrets).
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        with:
          projectPath: parkhub-desktop
          args: --bundles msi,nsis

      - name: Stage installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path parkhub-desktop-windows-x64
          Get-ChildItem -Path target/release/bundle -Recurse -Include *.msi,*.exe `
            | Copy-Item -Destination parkhub-desktop-windows-x64/
          Get-ChildItem parkhub-desktop-windows-x64/

      - name: Package installers
        shell: pwsh
        run: |
          Compress-Archive -Path parkhub-desktop-windows-x64 -DestinationPath parkhub-desktop-windows-x64.msi.zip

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: parkhub-desktop-windows-x64
          path: parkhub-desktop-windows-x64.msi.zip
          retention-days: 14

  release:
    name: Create Release
    # `needs:` here enforces *timing*, not gating: it ensures every build
    # job finishes (success OR failure) before we try to download their
    # artifacts. The `if: always() && build-linux == success` condition
    # is what actually gates — release runs even if macos/arm64/windows
    # failed, provided linux-x64 produced an artifact. The downloads
    # below use `continue-on-error: true`, so missing artifacts are
    # silently skipped and the release still publishes with whatever
    # platforms succeeded.
    needs: [build-linux, build-linux-arm64, build-macos, build-windows, tauri-linux, tauri-macos, tauri-windows]
    if: always() && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # required to publish a GitHub Release with assets
      attestations: write  # required by actions/attest-build-provenance for release artifacts
      id-token: write  # required for OIDC-based attestation signing
    steps:
      - name: Download Linux x64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: parkhub-linux-x64

      - name: Download Linux ARM64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: parkhub-linux-arm64

      - name: Download macOS universal artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: parkhub-macos-universal

      - name: Download Windows artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: parkhub-windows-x64

      - name: Download Tauri Linux installers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: parkhub-desktop-linux-x64

      - name: Download Tauri macOS installers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: parkhub-desktop-macos

      - name: Download Tauri Windows installers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: parkhub-desktop-windows-x64

      - name: Generate checksums
        # Sum every archive that actually made it through the matrix. The
        # wildcard + `2>/dev/null || true` pattern keeps us from exploding
        # when (say) macOS failed to produce its tarball.
        run: |
          set -e
          for f in \
              parkhub-linux-x64.tar.gz \
              parkhub-linux-arm64.tar.gz \
              parkhub-macos-universal.tar.gz \
              parkhub-windows-x64.zip \
              parkhub-desktop-linux-x64.zip \
              parkhub-desktop-macos.dmg.zip \
              parkhub-desktop-windows-x64.msi.zip; do
            if [ -f "$f" ]; then
              sha256sum "$f" >> checksums.txt
            fi
          done
          cat checksums.txt

      - name: Attest release artifacts
        # GHA installation API rate-limit hits this step intermittently
        # (v5.0.6 release.yml run 25108343017 failed here, then v5.0.4
        # before that). Make it advisory so cosign signing + Syft SBOM
        # + Create Release still publish the artifacts even when the
        # SLSA attestations API is rate-limited.
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: |
            parkhub-linux-x64.tar.gz
            checksums.txt

      # SOTA-2026 supply-chain: keyless cosign signatures + SPDX SBOMs for
      # every release archive. The signatures (.sig + .pem) let downstream
      # consumers verify with `cosign verify-blob --certificate-identity-regexp
      # '^https://github\.com/nash87/parkhub-rust/\.github/workflows/release\.yml@refs/tags/v.*$'
      # --certificate-oidc-issuer https://token.actions.githubusercontent.com`.
      # The SBOMs are SPDX-2.3 JSON, generated by Syft from the unpacked
      # archive contents.
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: 'v3.0.6'

      - name: Install syft
        uses: anchore/sbom-action/download-syft@d8a2c0130026bf585de5c176ab8f7ce62d75bf04 # v0.20.7

      - name: Sign release archives (cosign keyless)
        # cosign 3.x default behaviour writes a Sigstore bundle file
        # alongside .sig/.cert; without --bundle <path> it tries to
        # open an empty path and exits 1 ("create bundle file: open :
        # no such file or directory"). Pin --bundle explicitly so the
        # new-bundle-format file is named alongside .sig/.pem.
        run: |
          set -euo pipefail
          for f in parkhub-linux-x64.tar.gz parkhub-linux-arm64.tar.gz parkhub-macos-universal.tar.gz parkhub-windows-x64.zip checksums.txt; do
            if [ -f "$f" ]; then
              echo "Signing $f"
              cosign sign-blob --yes \
                --output-signature "${f}.sig" \
                --output-certificate "${f}.pem" \
                --bundle "${f}.cosign.bundle" \
                "$f"
            fi
          done

      - name: Generate SPDX SBOMs
        run: |
          set -euo pipefail
          for f in parkhub-linux-x64.tar.gz parkhub-linux-arm64.tar.gz parkhub-macos-universal.tar.gz parkhub-windows-x64.zip; do
            if [ -f "$f" ]; then
              echo "SBOM for $f"
              syft "$f" -o spdx-json="${f}.spdx.json"
              python3 -c "import json,sys; json.load(open('${f}.spdx.json'))"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          fail_on_unmatched_files: false
          files: |
            parkhub-linux-x64.tar.gz
            parkhub-linux-arm64.tar.gz
            parkhub-macos-universal.tar.gz
            parkhub-windows-x64.zip
            parkhub-desktop-linux-x64.zip
            parkhub-desktop-macos.dmg.zip
            parkhub-desktop-windows-x64.msi.zip
            checksums.txt
            parkhub-linux-x64.tar.gz.sig
            parkhub-linux-arm64.tar.gz.sig
            parkhub-macos-universal.tar.gz.sig
            parkhub-windows-x64.zip.sig
            checksums.txt.sig
            parkhub-linux-x64.tar.gz.pem
            parkhub-linux-arm64.tar.gz.pem
            parkhub-macos-universal.tar.gz.pem
            parkhub-windows-x64.zip.pem
            checksums.txt.pem
            parkhub-linux-x64.tar.gz.cosign.bundle
            parkhub-linux-arm64.tar.gz.cosign.bundle
            parkhub-macos-universal.tar.gz.cosign.bundle
            parkhub-windows-x64.zip.cosign.bundle
            checksums.txt.cosign.bundle
            parkhub-linux-x64.tar.gz.spdx.json
            parkhub-linux-arm64.tar.gz.spdx.json
            parkhub-macos-universal.tar.gz.spdx.json
            parkhub-windows-x64.zip.spdx.json
          generate_release_notes: true
