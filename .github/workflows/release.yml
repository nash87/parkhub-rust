name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22.12.0'

jobs:
  validate-tag:
    name: Validate release ref
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require v* tag ref
        run: |
          if [[ ! "${GITHUB_REF}" =~ ^refs/tags/v ]]; then
            echo "workflow_dispatch must target a v* tag ref"
            exit 1
          fi

  build-linux:
    name: Build Linux
    needs: [validate-tag]
    if: always() && (needs.validate-tag.result == 'success' || needs.validate-tag.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libfontconfig1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: parkhub-web/package-lock.json

      - name: Build web frontend
        working-directory: parkhub-web
        run: |
          npm ci
          npm run build

      - name: Build server (headless)
        run: cargo build --locked --release --package parkhub-server --no-default-features --features headless

      - name: Build client
        run: cargo build --locked --release --package parkhub-client

      - name: Create portable package
        run: |
          mkdir -p parkhub-linux-x64
          cp target/release/parkhub-server parkhub-linux-x64/
          cp target/release/parkhub parkhub-linux-x64/
          cp README.md LICENSE parkhub-linux-x64/
          mkdir -p parkhub-linux-x64/parkhub-data
          touch parkhub-linux-x64/parkhub-data/.portable
          tar -czvf parkhub-linux-x64.tar.gz parkhub-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: parkhub-linux-x64
          path: parkhub-linux-x64.tar.gz
          retention-days: 14

  build-windows:
    name: Build Windows
    needs: [validate-tag]
    if: always() && (needs.validate-tag.result == 'success' || needs.validate-tag.result == 'skipped')
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install OpenSSL (vcpkg)
        run: |
          vcpkg install openssl:x64-windows-static-md
          echo "OPENSSL_DIR=C:\vcpkg\installed\x64-windows-static-md" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: parkhub-web/package-lock.json

      - name: Build web frontend
        working-directory: parkhub-web
        run: |
          npm ci
          npm run build

      - name: Build server (headless)
        run: cargo build --locked --release --package parkhub-server --no-default-features --features headless

      - name: Build client
        run: cargo build --locked --release --package parkhub-client

      - name: Create portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path parkhub-windows-x64
          Copy-Item target/release/parkhub-server.exe parkhub-windows-x64/
          Copy-Item target/release/parkhub.exe parkhub-windows-x64/
          Copy-Item README.md parkhub-windows-x64/
          Copy-Item LICENSE parkhub-windows-x64/
          New-Item -ItemType Directory -Force -Path parkhub-windows-x64/parkhub-data
          New-Item -ItemType File -Force -Path parkhub-windows-x64/parkhub-data/.portable
          Compress-Archive -Path parkhub-windows-x64 -DestinationPath parkhub-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: parkhub-windows-x64
          path: parkhub-windows-x64.zip
          retention-days: 14

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    if: always() && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: parkhub-linux-x64

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: parkhub-windows-x64

      - name: Generate checksums
        run: sha256sum parkhub-linux-x64.tar.gz parkhub-windows-x64.zip > checksums.txt 2>/dev/null || sha256sum parkhub-linux-x64.tar.gz > checksums.txt

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            parkhub-linux-x64.tar.gz
            checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: false
          files: |
            parkhub-linux-x64.tar.gz
            parkhub-windows-x64.zip
            checksums.txt
          generate_release_notes: true
