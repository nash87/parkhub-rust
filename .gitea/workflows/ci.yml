name: ParkHub mirror CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Cargo Format
    runs-on: ubuntu-latest
    container:
      image: rust:1.85
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  check:
    name: Cargo Check (headless)
    runs-on: ubuntu-latest
    container:
      image: rust:1.85
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run cargo check
        run: |
          cargo check --locked --package parkhub-common --all-targets
          cargo check --locked --package parkhub-server --no-default-features --features headless --all-targets

  clippy:
    name: Cargo Clippy (headless)
    runs-on: ubuntu-latest
    container:
      image: rust:1.85
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install clippy
        run: rustup component add clippy

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run clippy
        run: |
          cargo clippy --locked --package parkhub-common --all-targets -- -D warnings
          cargo clippy --locked --package parkhub-server --no-default-features --features headless --all-targets -- -D warnings

  test:
    name: Cargo Test (headless)
    runs-on: ubuntu-latest
    container:
      image: rust:1.85
    needs: [check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run tests
        run: |
          cargo test --locked --package parkhub-common --all-targets
          cargo test --locked --package parkhub-server --no-default-features --features headless --all-targets
