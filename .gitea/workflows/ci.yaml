name: CI

# Gitea mirror of `.github/workflows/ci.yml`. Mirrored from the COMMITTED
# version (the working-tree edit on `chore/local-first-ci-cd-attestation-2026`
# carries pilot fop local-first PR attestation work that lives in `.gitea/
# workflows/ci.yml` separately — keep the two sources of truth split until
# the pilot lands).
#
# Action-ref rewrite policy: `actions/*` → Gitea local mirror at
# 192.168.178.233:3000/actions/*. Third-party actions stay on github.com so the
# Gitea runner pulls them directly.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22.12.0'
  DEMO_MODE: 'true'
  PARKHUB_ADMIN_PASSWORD: demo

jobs:
  actionlint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: https://192.168.178.233/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

      - name: Lint YAML manifests
        run: |
          python3 -m pip install --user yamllint
          ~/.local/bin/yamllint -d relaxed .github/workflows docker-compose.yml docker-compose.test.yml render.yaml koyeb.yaml

      - name: Validate Fly config
        run: python3 -c "import pathlib, tomllib; tomllib.loads(pathlib.Path('fly.toml').read_text())"

  helm-validate:
    name: Helm validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: https://192.168.178.233/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Validate Helm chart
        run: |
          helm lint ./helm/parkhub
          helm template parkhub ./helm/parkhub > /tmp/rendered-default.yaml
          helm template parkhub ./helm/parkhub --set grafana.dashboardsEnabled=true > /tmp/rendered-grafana.yaml
          helm template parkhub ./helm/parkhub --set pdb.enabled=true > /tmp/rendered-ha.yaml
          helm template parkhub ./helm/parkhub --set monitoring.serviceMonitor.enabled=true > /tmp/rendered-servicemonitor.yaml
          helm template parkhub ./helm/parkhub --set monitoring.prometheusRule.enabled=true > /tmp/rendered-prometheusrule.yaml
          python3 -m pip install --user pyyaml
          python3 - <<'PY'
          import pathlib, yaml
          for path in pathlib.Path('/tmp').glob('rendered-*.yaml'):
              list(yaml.safe_load_all(path.read_text()))
          PY

  # NOTE: dependency-review intentionally NOT mirrored — actions/dependency-review-action
  # is a GitHub-only API. Gitea-side coverage is handled by `cargo deny` below.

  # NOTE: local-ci-attestation intentionally NOT mirrored — depends on
  # GitHub commit-status API + gh CLI auth. The pilot fop local-first
  # attestation lives in `.gitea/workflows/ci.yml` (uncommitted) separately.

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: https://192.168.178.233/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@58e862542551f667fa44c8a2a4a1d64ad477c96a # v2.75.17
        with:
          tool: cargo-deny

      - name: Run cargo-deny
        run: cargo deny check advisories bans licenses sources

  fmt:
    name: Cargo Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: https://192.168.178.233/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  check:
    name: Cargo Check (headless)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: https://192.168.178.233/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run cargo check
        run: |
          cargo check --locked --package parkhub-common --all-targets
          cargo check --locked --package parkhub-server --no-default-features --features headless --all-targets

  client-check:
    name: Desktop Client Check
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: https://192.168.178.233/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libfontconfig1-dev

      - name: Check desktop client
        run: cargo check --locked --package parkhub-client --all-targets

  clippy:
    name: Cargo Clippy (headless)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: https://192.168.178.233/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run clippy
        run: |
          cargo clippy --locked --package parkhub-common --all-targets -- -D warnings
          cargo clippy --locked --package parkhub-server --no-default-features --features headless --all-targets -- -D warnings -A clippy::cognitive_complexity -A clippy::assigning_clones

  test:
    name: Cargo Test (headless)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [check]
    steps:
      - uses: https://192.168.178.233/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Run tests
        run: |
          cargo test --locked --package parkhub-common --all-targets
          cargo test --locked --package parkhub-server --no-default-features --features headless --all-targets

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: parkhub-web
    steps:
      - uses: https://192.168.178.233/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: https://192.168.178.233/actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: parkhub-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

      - name: Build frontend
        run: npm run build

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    steps:
      - uses: https://192.168.178.233/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Build server binary
        run: cargo build --locked --package parkhub-server --no-default-features --features headless

      - name: Run integration tests
        run: cargo test --locked --package parkhub-server --no-default-features --features headless -- integration --test-threads=1
        env:
          RUST_LOG: warn

  types-drift:
    name: TypeScript types drift
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: https://192.168.178.233/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Prepare embedded web placeholder
        run: |
          mkdir -p parkhub-web/dist
          printf '%s' '<!doctype html><html><body></body></html>' > parkhub-web/dist/index.html

      - name: Regenerate TypeScript bindings from Rust
        run: cargo test --locked --features gen-types -p parkhub-server --test ts_export -- --nocapture

      - name: Fail if generated types drifted
        run: |
          drift=0
          if ! git diff --exit-code parkhub-web/src/generated/; then
            echo "::error::parkhub-web/src/generated/ has modified or deleted files (drift from Rust source)."
            drift=1
          fi
          untracked="$(git status --porcelain parkhub-web/src/generated/)"
          if [ -n "$untracked" ]; then
            echo "::error::parkhub-web/src/generated/ has untracked or modified files not yet committed:"
            printf '%s\n' "$untracked"
            drift=1
          fi
          if [ "$drift" -ne 0 ]; then
            echo "Regenerate locally with:"
            echo "  cargo test --features gen-types -p parkhub-server --test ts_export -- --nocapture"
            echo "and commit the updated files."
            exit 1
          fi
          echo "Generated TypeScript types match the Rust source."

  openapi-drift:
    name: OpenAPI drift
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: https://192.168.178.233/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Setup Node.js
        uses: https://192.168.178.233/actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: parkhub-web/package-lock.json

      - name: Build frontend (rust_embed source)
        run: cd parkhub-web && npm ci && npm run build

      - name: Build server
        run: cargo build --locked --release -p parkhub-server --no-default-features --features 'full,headless'

      - name: Start server in background
        shell: bash
        run: |
          mkdir -p /tmp/parkhub-drift-db
          ./target/release/parkhub-server --headless --unattended --port 18181 --data-dir /tmp/parkhub-drift-db > /tmp/parkhub-drift.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          READY=0
          for _i in $(seq 1 45); do
            if curl -sf http://localhost:18181/health > /dev/null 2>&1; then
              READY=1
              break
            fi
            sleep 1
          done
          if [ "$READY" -ne 1 ]; then
            echo 'Server did not become healthy in time'
            tail -n 50 /tmp/parkhub-drift.log
            exit 1
          fi

      - name: Regenerate Rust OpenAPI snapshot
        run: ./scripts/dump-openapi.sh 18181

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true

      - name: Fail if snapshot drifted
        run: |
          if ! git diff --exit-code docs/openapi/rust.json; then
            echo "::error::docs/openapi/rust.json is out of sync with the code."
            echo "Run ./scripts/dump-openapi.sh locally (against a running server on 18181) and commit the updated snapshot."
            exit 1
          fi
          echo "Rust OpenAPI snapshot matches the current code."

  required:
    name: Required checks
    if: always()
    needs: [actionlint, helm-validate, cargo-deny, fmt, check, client-check, clippy, test, frontend, integration, openapi-drift, types-drift]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check results
        env:
          ACTIONLINT: ${{ needs.actionlint.result }}
          HELM_VALIDATE: ${{ needs.helm-validate.result }}
          CARGO_DENY: ${{ needs.cargo-deny.result }}
          CHECK: ${{ needs.check.result }}
          CLIENT_CHECK: ${{ needs.client-check.result }}
          TEST: ${{ needs.test.result }}
          FRONTEND: ${{ needs.frontend.result }}
          FMT: ${{ needs.fmt.result }}
          CLIPPY: ${{ needs.clippy.result }}
          INTEGRATION: ${{ needs.integration.result }}
          OPENAPI_DRIFT: ${{ needs.openapi-drift.result }}
          TYPES_DRIFT: ${{ needs.types-drift.result }}
        run: |
          for check in ACTIONLINT HELM_VALIDATE CARGO_DENY; do
            if [[ "${!check}" != "success" ]]; then
              echo "REQUIRED: ${check} failed: ${!check}"
              exit 1
            fi
          done
          for check in CHECK CLIENT_CHECK TEST FRONTEND FMT CLIPPY OPENAPI_DRIFT TYPES_DRIFT; do
            if [[ "${!check}" != "success" && "${!check}" != "skipped" ]]; then
              echo "REQUIRED: ${check} failed: ${!check}"
              exit 1
            fi
          done
          if [[ "${INTEGRATION}" != "success" ]]; then
            echo "ADVISORY: INTEGRATION: ${INTEGRATION}"
          fi
          echo "All checks passed"
