name: Helm Chart

# Gitea mirror of `.github/workflows/helm.yml`.

on:
  pull_request:
    paths:
      - 'helm/**'
      - '.gitea/workflows/helm.yaml'
      - '.github/workflows/helm.yml'
  push:
    branches: [main]
    paths:
      - 'helm/**'
      - '.gitea/workflows/helm.yaml'
      - '.github/workflows/helm.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + Template
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: http://192.168.178.212:3000/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: 'v3.16.4'
      - name: helm lint
        run: helm lint helm/parkhub
      - name: helm template (default values)
        run: helm template release helm/parkhub > /tmp/rendered-default.yaml
      - name: helm template (grafana opt-in)
        run: helm template release helm/parkhub --set grafana.dashboardsEnabled=true > /tmp/rendered-grafana.yaml
      - name: helm template (pdb + topology enabled)
        run: helm template release helm/parkhub --set pdb.enabled=true > /tmp/rendered-ha.yaml
      - name: helm template (ServiceMonitor enabled)
        run: helm template release helm/parkhub --set monitoring.serviceMonitor.enabled=true > /tmp/rendered-servicemonitor.yaml
      - name: helm template (PrometheusRule enabled)
        run: helm template release helm/parkhub --set monitoring.prometheusRule.enabled=true > /tmp/rendered-prometheusrule.yaml
      - name: Validate rendered YAML
        run: |
          for f in /tmp/rendered-*.yaml; do
            yq eval-all '.' "$f" > /dev/null || { echo "YAML parse failed in $f"; exit 1; }
          done
