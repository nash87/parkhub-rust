# ParkHub Helm Chart — default values

replicaCount: 1

image:
  repository: ghcr.io/nash87/parkhub-rust
  pullPolicy: IfNotPresent
  tag: ""  # defaults to appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  # PSS "restricted" profile — constrains syscalls to the RuntimeDefault
  # seccomp profile (blocks known-dangerous calls like unshare, kexec,
  # swapon, etc.). parkhub-server is a pure-async axum binary and has no
  # need for anything outside the default profile.
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: parkhub.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: parkhub-tls
  #    hosts:
  #      - parkhub.local

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /data

nodeSelector: {}
tolerations: []
affinity: {}

# -- PodDisruptionBudget (T-1790)
# minAvailable: 1 blocks all-at-once evictions during node drains while still
# permitting rolling updates (which respect maxUnavailable on the Deployment).
pdb:
  enabled: true
  minAvailable: 1

# -- topologySpreadConstraints (T-1791)
# Spread replicas across nodes so a single-node outage doesn't take the whole
# Deployment down. whenUnsatisfiable: ScheduleAnyway keeps single-node/dev
# clusters schedulable (pods still land, just all on one node).
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: parkhub

# -- Application configuration
config:
  # Server
  port: 8080
  logLevel: info
  demoMode: false

  # Admin
  adminPassword: ""  # auto-generated if empty

  # Database encryption
  dbPassphrase: ""  # leave empty to disable AES-256-GCM at rest

  # SMTP
  smtp:
    host: ""
    port: 587
    user: ""
    password: ""  # REQUIRED if smtp.host is set — override at deploy time (--set secrets.smtp.password=...)
    from: "noreply@parkhub.local"

  # Stripe
  stripe:
    secretKey: ""
    webhookSecret: ""

  # OAuth
  oauth:
    google:
      clientId: ""
      clientSecret: ""
    github:
      clientId: ""
      clientSecret: ""

# -- Module feature flags (all enabled by default)
modules:
  bookings: true
  vehicles: true
  absences: true
  branding: true
  import: true
  qr: true
  pwa: true
  payments: true
  webhooks: true
  notifications: true
  announcements: true
  recurring: true
  guest: true
  calendar: true
  team: true
  settings: true
  jobs: true
  swap: true
  waitlist: true
  zones: true
  credits: true
  email: true
  export: true
  favorites: true
  push: true
  recommendations: true
  translations: true
  social: true
  themes: true
  invoices: true
  dynamicPricing: true
  operatingHours: true
  oauth: true
  map: true
  stripe: true
  tenants: true
  rateLimit: true
  accessible: true
  maintenance: true
  costCenter: true
  fleet: true
  dataManagement: true
  auditLogUi: true
  history: true
  geofence: true
  visitors: true
  evCharging: true
  waitlistExt: true
  parkingPass: true
  apiDocs: true
  absenceApproval: true
  calendarDrag: true
  widgets: true

# -- Observability: ServiceMonitor + PrometheusRule (prometheus-operator)
# Both flags default to false so the chart installs cleanly on clusters
# that do not have monitoring.coreos.com/v1 CRDs. Operators flip them
# on once prometheus-operator is installed.
monitoring:
  serviceMonitor:
    enabled: false
    # interval: 30s
    # scrapeTimeout: 10s
    # additionalLabels: {}  # e.g. release: kube-prometheus-stack
    # bearerTokenSecret:
    #   name: parkhub-metrics
    #   key: METRICS_TOKEN
  prometheusRule:
    enabled: false
    # additionalLabels: {}
    # alertLabels: {}  # e.g. team: platform

# -- Extra environment variables
extraEnv: []
#  - name: CUSTOM_VAR
#    value: "custom-value"
